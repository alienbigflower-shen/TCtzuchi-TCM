<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臺中慈濟醫院中醫部 - 綜合行事曆</title>
  <!-- Tailwind CSS 樣式庫 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 與 Supabase SDK -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* 🖨️ 專為全月列印優化的 CSS */
    @media print {
      @page {
        size: landscape; /* 橫向滿版 */
        margin: 6mm;
      }
      .no-print { display: none !important; }
      body { 
        background-color: white !important; 
        padding: 0 !important; 
        margin: 0 !important; 
        font-size: 11px !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .print-table {
        border-collapse: collapse !important;
        width: 100% !important;
      }
      .print-cell {
        border: 1px solid #d1d5db !important;
        vertical-align: top !important;
        padding: 4px !important;
        height: auto !important; 
        min-height: 110px !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
      }
      .print-event-card {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        margin-bottom: 4px !important;
      }
      .shadow-sm, .border, .shadow, .rounded-2xl, .rounded-xl { 
        box-shadow: none !important; 
      }
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen p-3 md:p-8 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = 'https://htmectgbwqvvuvrajsln.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0bWVjdGdid3F2dnV2cmFqc2xuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MjMyOTksImV4cCI6MjEwMDE5OTI5OX0.5Kd47QjwR_E1Q9yEorLzb49blW-EfpzDmcobP2QjfMw'; 
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const getTodayString = () => {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    function App() {
      const todayStr = getTodayString();
      const todayObj = new Date();

      const [user, setUser] = useState(null);
      const [isApproved, setIsApproved] = useState(false);
      const [loading, setLoading] = useState(true);

      const [currentTab, setCurrentTab] = useState('calendar');
      const [currentYear, setCurrentYear] = useState(todayObj.getFullYear());
      const [currentMonth, setCurrentMonth] = useState(todayObj.getMonth() + 1);
      const [selectedDept, setSelectedDept] = useState('內一');
      const [focusDate, setFocusDate] = useState(todayStr);

      const [events, setEvents] = useState([]);
      const [rosterShifts, setRosterShifts] = useState([]);
      const [bulletins, setBulletins] = useState([]);
      const [personnelList, setPersonnelList] = useState([]);
      const [courses, setCourses] = useState([]);

      const [showEventModal, setShowEventModal] = useState(false);
      const [showRosterModal, setShowRosterModal] = useState(false);
      const [showBulletinModal, setShowBulletinModal] = useState(false);
      const [showPersonnelModal, setShowPersonnelModal] = useState(false);
      const [showCourseModal, setShowCourseModal] = useState(false);
      const [selectedEvent, setSelectedEvent] = useState(null);

      const [newEvent, setNewEvent] = useState({ 
        editId: null, 
        title: '', 
        participants: '', 
        day: todayObj.getDate(), 
        time: '08:00~09:00', 
        location: '', 
        instructor: '黃仲諄醫師', 
        presenter: '', 
        recorder: '', 
        color: '紅色', 
        isRecurring: false, 
        weeklyDay: 1 
      });

      const [newRoster, setNewRoster] = useState({ 
        editId: null, 
        day: todayObj.getDate(), 
        dept: '內一', 
        shift: '早診', 
        doctor: '伍崇弘醫師', 
        studentName: '', 
        isTeaching: false, 
        isRecurring: false, 
        selectedSlots: [] 
      });

      const [newBulletin, setNewBulletin] = useState({ title: '', content: '', author: '黃仲諄醫師', level: '普通' });
      
      const [newPerson, setNewPerson] = useState({ 
        editId: null, 
        category: 'chiefDepartment', 
        name: '', 
        note: '', 
        deptName: '內一', 
        supervisorDoctor: '', 
        groupCode: 'A', 
        rotationDept: '內一' 
      });

      const [newCourse, setNewCourse] = useState({
        editId: null,
        isScheduled: true,
        date: todayStr,
        instructor: '',
        content: '',
        isConfirmed: false
      });

      const getShiftStyle = (shift, isTeaching) => {
        if (isTeaching) {
          return 'bg-pink-100/90 border-pink-300 text-pink-950 hover:border-pink-500 shadow-sm';
        }
        if (shift === '早診') return 'bg-amber-50/90 border-amber-200 text-amber-900 hover:border-amber-400';
        if (shift === '午診') return 'bg-sky-50/90 border-sky-200 text-sky-900 hover:border-sky-400';
        if (shift === '晚診') return 'bg-purple-50/90 border-purple-200 text-purple-900 hover:border-purple-400';
        return 'bg-blue-50/90 border-blue-200 text-blue-900 hover:border-blue-400';
      };

      const getColorHex = (colorName) => {
        if (colorName === '紅色') return '#FEE2E2'; 
        if (colorName === '黃色') return '#FEF3C7'; 
        if (colorName === '綠色') return '#D1FAE5'; 
        return '#FEE2E2';
      };

      const getEventCardStyle = (ev) => {
        let bg = ev.color;
        if (ev.color === '#EF4444' || ev.level === '紅色') bg = '#FEE2E2';
        else if (ev.color === '#EAB308' || ev.level === '黃色') bg = '#FEF3C7';
        else if (ev.color === '#10B981' || ev.level === '綠色') bg = '#D1FAE5';
        else if (!bg) bg = '#FEE2E2';
        return { backgroundColor: bg, color: '#111827' };
      };

      const parsePresenter = (note) => {
        if (note && note.startsWith('報告醫師：')) {
          return note.replace('報告醫師：', '');
        }
        return '';
      };

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          const currentUser = session?.user ?? null;
          setUser(currentUser);
          if (currentUser) checkApproval(currentUser.email);
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          const currentUser = session?.user ?? null;
          setUser(currentUser);
          if (currentUser) {
            checkApproval(currentUser.email);
            if (window.location.hash.includes('access_token')) {
              window.history.replaceState(null, '', window.location.pathname);
            }
          } else {
            setIsApproved(false);
          }
        });

        fetchAllData();
        return () => subscription.unsubscribe();
      }, []);

      const checkApproval = async (email) => {
        if (!email) return setIsApproved(false);
        const cleanEmail = email.trim().toLowerCase();

        if (cleanEmail === 'alienbigflower@gmail.com') {
          setIsApproved(true);
          return;
        }

        try {
          const { data } = await supabase
            .from('approved_users')
            .select('email')
            .ilike('email', cleanEmail)
            .maybeSingle();

          setIsApproved(!!data);
        } catch (err) {
          console.error('Check approval error:', err);
          setIsApproved(false);
        }
      };

      const fetchAllData = async () => {
        setLoading(true);
        const { data: evData } = await supabase.from('events').select('*');
        if (evData) setEvents(evData);

        const { data: roData } = await supabase.from('roster_shifts').select('*');
        if (roData) setRosterShifts(roData);

        const { data: buData } = await supabase.from('bulletins').select('*').order('id', { ascending: false });
        if (buData) setBulletins(buData);

        const { data: peData } = await supabase.from('personnel').select('*');
        if (peData) setPersonnelList(peData);

        const { data: coData } = await supabase.from('core_courses').select('*');
        if (coData) setCourses(coData);

        setLoading(false);
      };

      const handleSaveEvent = async (e) => {
        e.preventDefault();
        if (!isApproved) return alert('權限不足！');
        if (!newEvent.title) return alert('請填寫事件標題！');

        const colorHex = getColorHex(newEvent.color);

        if (newEvent.isRecurring && !newEvent.editId) {
          const targetDayOfWeek = parseInt(newEvent.weeklyDay);
          const totalDays = new Date(currentYear, currentMonth, 0).getDate();
          const batchItems = [];

          for (let d = 1; d <= totalDays; d++) {
            const w = new Date(currentYear, currentMonth - 1, d).getDay();
            if (w === targetDayOfWeek) {
              batchItems.push({
                year: currentYear,
                month: currentMonth,
                day: d,
                title: newEvent.title,
                participants: newEvent.participants,
                time: newEvent.time,
                location: newEvent.location,
                instructor: newEvent.instructor,
                note: newEvent.presenter ? `報告醫師：${newEvent.presenter}` : '',
                recorder: newEvent.recorder,
                color: colorHex,
                level: newEvent.color,
                is_recurring: true,
                weekly_day: targetDayOfWeek
              });
            }
          }

          const { data, error } = await supabase.from('events').insert(batchItems).select();
          if (error) {
            alert('批次新增失敗：' + error.message);
          } else if (data) {
            setEvents([...events, ...data]);
            alert(`已成功批次建立當月所有【週${['日','一','二','三','四','五','六'][targetDayOfWeek]}】的事件！`);
          }
        } else {
          const item = {
            year: currentYear,
            month: currentMonth,
            day: parseInt(newEvent.day),
            title: newEvent.title,
            participants: newEvent.participants,
            time: newEvent.time,
            location: newEvent.location,
            instructor: newEvent.instructor,
            note: newEvent.presenter ? `報告醫師：${newEvent.presenter}` : '',
            recorder: newEvent.recorder,
            color: colorHex,
            level: newEvent.color,
            is_recurring: false,
            weekly_day: new Date(currentYear, currentMonth - 1, parseInt(newEvent.day)).getDay()
          };

          if (newEvent.editId) {
            const { data, error } = await supabase.from('events').update(item).eq('id', newEvent.editId).select();
            if (!error && data) {
              setEvents(events.map(ev => ev.id === newEvent.editId ? data[0] : ev));
              setSelectedEvent(data[0]);
              alert('事件更新成功！');
            } else if (error) {
              alert('更新失敗：' + error.message);
            }
          } else {
            const { data, error } = await supabase.from('events').insert([item]).select();
            if (!error && data) {
              setEvents([...events, data[0]]);
              alert('事件新增成功！');
            } else if (error) {
              alert('新增失敗：' + error.message);
            }
          }
        }

        setShowEventModal(false);
        setNewEvent({ 
          editId: null, 
          title: '', 
          participants: '', 
          day: todayObj.getDate(), 
          time: '08:00~09:00', 
          location: '', 
          instructor: '黃仲諄醫師', 
          presenter: '', 
          recorder: '', 
          color: '紅色', 
          isRecurring: false, 
          weeklyDay: 1 
        });
      };

      const handleDeleteEvent = async (ev) => {
        if (!isApproved) return alert('權限不足！');
        
        if (ev.is_recurring) {
          const opt = prompt(`刪除每週固定事件【${ev.title}】\n\n[1] 僅刪除 ${ev.month}/${ev.day} 此單日事件\n[2] 批次刪除包含今日與後續所有相同事件`, "1");
          if (opt === '1') {
            await supabase.from('events').delete().eq('id', ev.id);
            setEvents(events.filter(e => e.id !== ev.id));
            setSelectedEvent(null);
          } else if (opt === '2') {
            const { error } = await supabase.from('events').delete()
              .eq('title', ev.title)
              .eq('year', currentYear)
              .gte('month', ev.month)
              .gte('day', ev.day);
            
            if (!error) {
              setEvents(events.filter(e => !(e.title === ev.title && e.year === currentYear && ((e.month === ev.month && e.day >= ev.day) || e.month > ev.month))));
              setSelectedEvent(null);
              alert('已成功批次刪除所有後續重複事件！');
            }
          }
        } else {
          if (confirm('確定要刪除此行事曆事件嗎？')) {
            await supabase.from('events').delete().eq('id', ev.id);
            setEvents(events.filter(e => e.id !== ev.id));
            setSelectedEvent(null);
          }
        }
      };

      const openEditEventModal = (ev) => {
        const presenterVal = parsePresenter(ev.note);
        let colorName = '紅色';
        if (ev.color === '#EAB308' || ev.color === '#FEF3C7' || ev.level === '黃色') colorName = '黃色';
        if (ev.color === '#10B981' || ev.color === '#D1FAE5' || ev.level === '綠色') colorName = '綠色';

        setNewEvent({
          editId: ev.id,
          title: ev.title || '',
          participants: ev.participants || '',
          day: ev.day || 1,
          time: ev.time || '',
          location: ev.location || '',
          instructor: ev.instructor || '',
          presenter: presenterVal,
          recorder: ev.recorder || '',
          color: colorName,
          isRecurring: false,
          weeklyDay: ev.weekly_day || 1
        });
        setSelectedEvent(null);
        setShowEventModal(true);
      };

      const handleToggleSlot = (weeklyDay, shift) => {
        const slots = [...newRoster.selectedSlots];
        const index = slots.findIndex(s => s.weeklyDay === weeklyDay && s.shift === shift);
        if (index >= 0) {
          slots.splice(index, 1);
        } else {
          slots.push({ weeklyDay, shift });
        }
        setNewRoster({ ...newRoster, selectedSlots: slots });
      };

      // 🩺 儲存跟診門診 (具備 Supabase 欄位缺失保護)
      const handleSaveRoster = async (e) => {
        e.preventDefault();
        if (!isApproved) return alert('權限不足！僅限管理醫師/總醫師操作');

        const studentsArr = newRoster.studentName ? newRoster.studentName.split(/[,、\s]+/).map(s => s.trim()).filter(Boolean) : [];

        if (newRoster.editId) {
          const updatePayload = {
            doctor: newRoster.doctor, 
            shift: newRoster.shift, 
            students: studentsArr,
            is_teaching: newRoster.isTeaching,
            day: parseInt(newRoster.day)
          };

          let { data, error } = await supabase
            .from('roster_shifts')
            .update(updatePayload)
            .eq('id', newRoster.editId)
            .select();

          // 🛡️ 防護備案：若 Supabase 還沒開通 is_teaching 欄位，自動降級剔除該欄位再試一次
          if (error && error.message.includes('is_teaching')) {
            delete updatePayload.is_teaching;
            const fallback = await supabase
              .from('roster_shifts')
              .update(updatePayload)
              .eq('id', newRoster.editId)
              .select();
            data = fallback.data;
            error = fallback.error;
          }

          if (error) {
            alert('更新單診失敗：' + error.message);
          } else if (data) {
            setRosterShifts(rosterShifts.map(s => s.id === newRoster.editId ? data[0] : s));
            alert(`已成功獨立更新 ${currentMonth}/${newRoster.day} 的跟診資料！`);
          }
        } else if (newRoster.isRecurring) {
          if (newRoster.selectedSlots.length === 0) {
            return alert('請至少勾選一個「每週門診時段」！');
          }

          const totalDays = new Date(currentYear, currentMonth, 0).getDate();
          const batchShifts = [];

          for (let d = 1; d <= totalDays; d++) {
            const w = new Date(currentYear, currentMonth - 1, d).getDay();
            
            newRoster.selectedSlots.forEach(slot => {
              if (slot.weeklyDay === w) {
                batchShifts.push({
                  id: 's_' + Date.now() + '_' + d + '_' + slot.shift + '_' + Math.random().toString(36).substring(2, 6),
                  group_id: 'grp_' + Date.now() + '_' + slot.weeklyDay + '_' + slot.shift,
                  year: currentYear,
                  month: currentMonth,
                  day: d,
                  dept: selectedDept,
                  shift: slot.shift,
                  doctor: newRoster.doctor,
                  students: studentsArr,
                  is_teaching: newRoster.isTeaching,
                  is_recurring: true,
                  weekly_day: w
                });
              }
            });
          }

          let { data, error } = await supabase.from('roster_shifts').insert(batchShifts).select();

          // 🛡️ 防護備案
          if (error && error.message.includes('is_teaching')) {
            const cleanBatch = batchShifts.map(b => { const clone = {...b}; delete clone.is_teaching; return clone; });
            const fallback = await supabase.from('roster_shifts').insert(cleanBatch).select();
            data = fallback.data;
            error = fallback.error;
          }

          if (error) {
            alert('批次新增診次失敗：' + error.message);
          } else if (data) {
            setRosterShifts([...rosterShifts, ...data]);
            alert(`已成功為【${newRoster.doctor}】批次建置整個月共有 ${data.length} 個對應門診！`);
          }
        } else {
          const item = {
            id: 's_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7),
            group_id: null,
            year: currentYear, 
            month: currentMonth, 
            day: parseInt(newRoster.day),
            dept: selectedDept, 
            shift: newRoster.shift, 
            doctor: newRoster.doctor,
            students: studentsArr, 
            is_teaching: newRoster.isTeaching,
            is_recurring: false, 
            weekly_day: new Date(currentYear, currentMonth - 1, parseInt(newRoster.day)).getDay()
          };

          let { data, error } = await supabase.from('roster_shifts').insert([item]).select();

          if (error && error.message.includes('is_teaching')) {
            delete item.is_teaching;
            const fallback = await supabase.from('roster_shifts').insert([item]).select();
            data = fallback.data;
            error = fallback.error;
          }

          if (!error && data) {
            setRosterShifts([...rosterShifts, data[0]]);
            alert('已成功新增單日門診！');
          }
        }

        setShowRosterModal(false);
        setNewRoster({ editId: null, day: todayObj.getDate(), dept: selectedDept, shift: '早診', doctor: '伍崇弘醫師', studentName: '', isTeaching: false, isRecurring: false, selectedSlots: [] });
      };

      const handleCardClick = (e, shift, day) => {
        e.stopPropagation();
        if (isApproved) {
          setNewRoster({
            editId: shift.id,
            day: day,
            dept: selectedDept,
            shift: shift.shift,
            doctor: shift.doctor,
            studentName: shift.students ? shift.students.join(', ') : '',
            isTeaching: shift.is_teaching || false,
            isRecurring: false,
            selectedSlots: []
          });
          setShowRosterModal(true);
        } else {
          toggleBookingStudent(shift);
        }
      };

      const toggleBookingStudent = async (shift) => {
        if (!user) return alert('請先使用 Google 帳號登入！');
        const name = user.user_metadata?.full_name || user.email.split('@')[0];
        let updatedStudents = [...(shift.students || [])];

        if (updatedStudents.includes(name)) {
          if (!confirm(`確定要取消認領 ${shift.doctor} (${shift.shift}) 的跟診嗎？`)) return;
          updatedStudents = updatedStudents.filter(n => n !== name);
        } else {
          if (updatedStudents.length >= 2) return alert('該診次跟診名額已滿（上限 2 人）！');
          updatedStudents.push(name);
        }

        await supabase.from('roster_shifts').update({ students: updatedStudents }).eq('id', shift.id);
        setRosterShifts(rosterShifts.map(s => s.id === shift.id ? { ...s, students: updatedStudents } : s));
      };

      // 🗑️ 單獨與批次刪除門診
      const handleDeleteRoster = async (e, shift, day) => {
        e.stopPropagation();
        if (!isApproved) return alert('權限不足！');

        const opt = prompt(
          `刪除【${shift.doctor} - ${shift.shift}】(${currentMonth}/${day}號)\n\n` +
          `[1] 僅刪除 ${currentMonth}/${day}號 這一天單診\n` +
          `[2] 批次刪除【包含今日與後續所有】同醫師的 ${shift.shift} 診次`, 
          "1"
        );

        if (opt === '1') {
          await supabase.from('roster_shifts').delete().eq('id', shift.id);
          setRosterShifts(rosterShifts.filter(s => s.id !== shift.id));
        } else if (opt === '2') {
          let query;
          if (shift.group_id) {
            query = supabase.from('roster_shifts').delete()
              .eq('group_id', shift.group_id)
              .gte('day', day);
          } else {
            query = supabase.from('roster_shifts').delete()
              .eq('dept', selectedDept)
              .eq('shift', shift.shift)
              .eq('doctor', shift.doctor)
              .eq('year', currentYear)
              .gte('month', currentMonth)
              .gte('day', day);
          }

          const { error } = await query;
          if (!error) {
            if (shift.group_id) {
              setRosterShifts(rosterShifts.filter(s => !(s.group_id === shift.group_id && s.day >= day)));
            } else {
              setRosterShifts(rosterShifts.filter(s => !(
                s.dept === selectedDept && s.shift === shift.shift && s.doctor === shift.doctor &&
                s.year === currentYear && ((s.month === currentMonth && s.day >= day) || s.month > currentMonth)
              )));
            }
            alert(`已成功批次刪除門診！`);
          }
        }
      };

      const handleAddBulletin = async (e) => {
        e.preventDefault();
        if (!isApproved) return alert('權限不足！');
        const item = { ...newBulletin, date: new Date().toISOString().split('T')[0] };
        const { data, error } = await supabase.from('bulletins').insert([item]).select();
        if (!error && data) setBulletins([data[0], ...bulletins]);
        setShowBulletinModal(false);
      };

      const handleDeleteBulletin = async (id) => {
        if (!isApproved) return alert('權限不足！');
        if (confirm('確定刪除此公告？')) {
          await supabase.from('bulletins').delete().eq('id', id);
          setBulletins(bulletins.filter(b => b.id !== id));
        }
      };

      const handleSavePersonnel = async (e) => {
        e.preventDefault();
        if (!isApproved) return alert('權限不足！');

        let noteString = newPerson.note || '';

        if (newPerson.category === 'residents') {
          noteString = `${newPerson.deptName}｜負責主治：${newPerson.supervisorDoctor || '無'}`;
        } else if (newPerson.category === 'interns') {
          noteString = `${newPerson.groupCode}組 - ${newPerson.rotationDept}`;
        }

        const payload = {
          category: newPerson.category,
          name: newPerson.name,
          note: noteString
        };

        if (newPerson.editId) {
          const { data, error } = await supabase
            .from('personnel')
            .update(payload)
            .eq('id', newPerson.editId)
            .select();

          if (!error && data) {
            setPersonnelList(personnelList.map(p => p.id === newPerson.editId ? data[0] : p));
            alert('醫師資料已更新！');
          }
        } else {
          const { data, error } = await supabase
            .from('personnel')
            .insert([payload])
            .select();

          if (!error && data) {
            setPersonnelList([...personnelList, data[0]]);
            alert('成功新增醫師！');
          }
        }

        setShowPersonnelModal(false);
      };

      const openEditPersonnelModal = (p) => {
        if (!isApproved) return;

        let deptName = '內一';
        let supervisorDoctor = '';
        let groupCode = 'A';
        let rotationDept = '內一';

        if (p.category === 'residents' && p.note) {
          const parts = p.note.split('｜負責主治：');
          deptName = parts[0] || '內一';
          supervisorDoctor = parts[1] || '';
        } else if (p.category === 'interns' && p.note) {
          const parts = p.note.split('組 - ');
          groupCode = parts[0] || 'A';
          rotationDept = parts[1] || '內一';
        }

        setNewPerson({
          editId: p.id,
          category: p.category,
          name: p.name,
          note: p.note || '',
          deptName,
          supervisorDoctor,
          groupCode,
          rotationDept
        });
        setShowPersonnelModal(true);
      };

      const handleDeletePersonnel = async (e, id) => {
        e.stopPropagation();
        if (!isApproved) return alert('權限不足！');
        if (confirm('確定刪除該人員？')) {
          await supabase.from('personnel').delete().eq('id', id);
          setPersonnelList(personnelList.filter(p => p.id !== id));
        }
      };

      const handleSaveCourse = async (e) => {
        e.preventDefault();
        if (!isApproved) return alert('權限不足！');

        const payload = {
          is_scheduled: newCourse.isScheduled,
          course_date: newCourse.date,
          instructor: newCourse.instructor,
          content: newCourse.content,
          is_confirmed: newCourse.isConfirmed
        };

        if (newCourse.editId) {
          const { data, error } = await supabase
            .from('core_courses')
            .update(payload)
            .eq('id', newCourse.editId)
            .select();

          if (!error && data) {
            setCourses(courses.map(c => c.id === newCourse.editId ? data[0] : c));
            alert('課程變更已儲存！');
          } else if (error) {
            alert('儲存失敗：' + error.message);
          }
        } else {
          const { data, error } = await supabase
            .from('core_courses')
            .insert([payload])
            .select();

          if (!error && data) {
            setCourses([...courses, data[0]]);
            alert('已新增課程！');
          } else if (error) {
            alert('新增失敗：' + error.message);
          }
        }

        setShowCourseModal(false);
      };

      const handleToggleCourseConfirmed = async (course) => {
        if (!isApproved) return alert('權限不足！');
        const nextState = !course.is_confirmed;
        const { data, error } = await supabase
          .from('core_courses')
          .update({ is_confirmed: nextState })
          .eq('id', course.id)
          .select();

        if (!error && data) {
          setCourses(courses.map(c => c.id === course.id ? data[0] : c));
        }
      };

      const openEditCourseModal = (c) => {
        if (!isApproved) return;
        setNewCourse({
          editId: c.id,
          isScheduled: c.is_scheduled,
          date: c.course_date || todayStr,
          instructor: c.instructor || '',
          content: c.content || '',
          isConfirmed: c.is_confirmed || false
        });
        setShowCourseModal(true);
      };

      const handleDeleteCourse = async (id) => {
        if (!isApproved) return alert('權限不足！');
        if (confirm('確定刪除此課程？')) {
          await supabase.from('core_courses').delete().eq('id', id);
          setCourses(courses.filter(c => c.id !== id));
        }
      };

      const handlePrevMonth = () => { if (currentMonth === 1) { setCurrentMonth(12); setCurrentYear(currentYear - 1); } else { setCurrentMonth(currentMonth - 1); } };
      const handleNextMonth = () => { if (currentMonth === 12) { setCurrentMonth(1); setCurrentYear(currentYear + 1); } else { setCurrentMonth(currentMonth + 1); } };

      const updateFocusDateAndSyncCalendar = (newDateStr) => {
        setFocusDate(newDateStr);
        const [y, m] = newDateStr.split('-').map(Number);
        if (y && m) {
          setCurrentYear(y);
          setCurrentMonth(m);
        }
      };

      const handleFocusDateChange = (offset) => {
        const d = new Date(focusDate);
        d.setDate(d.getDate() + offset);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        updateFocusDateAndSyncCalendar(`${y}-${m}-${day}`);
      };

      const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
      const firstDayOfWeek = new Date(currentYear, currentMonth - 1, 1).getDay();
      const [focusY, focusM, focusD] = focusDate.split('-').map(Number);

      return (
        <div class="max-w-7xl mx-auto space-y-4 md:space-y-6">
          {/* Header */}
          <header class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border flex flex-wrap justify-between items-center gap-3">
            <div class="flex items-center gap-3">
              <div class="p-3 md:p-4 bg-blue-50 text-blue-600 rounded-2xl font-bold text-[24px] md:text-[28px] no-print">🏥</div>
              <div>
                <h1 class="text-[22px] md:text-[32px] font-bold text-gray-900 leading-tight">臺中慈濟醫院中醫部</h1>
                <p class="text-gray-500 text-[14px] md:text-[20px] mt-0.5">{currentYear}年{currentMonth}月 行事曆與跟診系統</p>
              </div>
            </div>
            
            <div class="no-print w-full md:w-auto flex justify-end">
              {user ? (
                <div class="flex items-center justify-between md:justify-start w-full md:w-auto gap-3 bg-gray-50 px-4 py-2.5 rounded-2xl border">
                  <div>
                    <div class="text-[16px] md:text-[20px] font-bold text-gray-800 flex items-center gap-2">
                      {user.user_metadata?.full_name || user.email.split('@')[0]}
                      {isApproved ? (
                        <span class="text-[12px] md:text-[14px] bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded-full font-bold">已開通總醫師</span>
                      ) : (
                        <span class="text-[12px] md:text-[14px] bg-gray-200 text-gray-700 px-2 py-0.5 rounded-full font-bold">一般學員</span>
                      )}
                    </div>
                  </div>
                  <button onClick={() => supabase.auth.signOut()} class="px-3 py-1.5 bg-white border text-gray-600 rounded-xl text-[15px] md:text-[20px] hover:bg-gray-100 font-bold">登出</button>
                </div>
              ) : (
                <button onClick={() => supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } })} class="w-full md:w-auto bg-blue-600 text-white px-5 py-2.5 md:py-3 rounded-2xl text-[16px] md:text-[20px] font-bold shadow hover:bg-blue-700">Google 帳號登入</button>
              )}
            </div>
          </header>

          {/* 導覽列 */}
          <nav class="flex gap-2 bg-white p-2 rounded-2xl border shadow-sm no-print overflow-x-auto no-scrollbar whitespace-nowrap">
            {[
              { id: 'today', name: '當日焦點', icon: '📍' },
              { id: 'calendar', name: '綜合行事曆', icon: '📅' },
              { id: 'roster', name: '跟診表', icon: '🩺' },
              { id: 'personnel', name: '中醫部醫師', icon: '👨‍⚕️' },
              { id: 'courses', name: '核心課程一覽表', icon: '📚' },
              { id: 'rules', name: '重要規範', icon: '📖' },
              { id: 'bulletin', name: '部上公佈欄', icon: '📢' }
            ].map(tab => (
              <button
                key={tab.id}
                onClick={() => setCurrentTab(tab.id)}
                class={`flex-shrink-0 py-2.5 px-4 rounded-xl font-bold text-[16px] md:text-[20px] transition flex items-center gap-2 ${
                  currentTab === tab.id ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'
                }`}
              >
                <span>{tab.icon}</span>
                <span>{tab.name}</span>
              </button>
            ))}
          </nav>

          {/* 1. 當日焦點 */}
          {currentTab === 'today' && (
            <div class="space-y-4 md:space-y-6">
              <div class="bg-gradient-to-r from-emerald-800 to-teal-900 p-5 md:p-8 rounded-2xl text-white shadow-md space-y-4">
                <div class="flex flex-wrap justify-between items-center gap-3">
                  <div>
                    <div class="text-[14px] md:text-[20px] opacity-80 font-bold uppercase tracking-wider">Today's Focus</div>
                    <h2 class="text-[22px] md:text-[32px] font-bold mt-1">重點動態（{focusY}年{focusM}月{focusD}日）</h2>
                  </div>

                  <div class="flex items-center gap-2 bg-white/10 p-2 rounded-2xl backdrop-blur-sm border border-white/20 text-[14px] md:text-[20px] w-full md:w-auto justify-between no-print">
                    <button onClick={() => handleFocusDateChange(-1)} class="px-2.5 py-1 bg-white/20 hover:bg-white/30 rounded-xl font-bold">◀ 前一天</button>
                    <input type="date" value={focusDate} onChange={e => updateFocusDateAndSyncCalendar(e.target.value)} class="bg-white text-gray-900 px-2 py-1 rounded-xl font-bold cursor-pointer outline-none" />
                    <button onClick={() => updateFocusDateAndSyncCalendar(getTodayString())} class="px-2.5 py-1 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-bold">今天</button>
                    <button onClick={() => handleFocusDateChange(1)} class="px-2.5 py-1 bg-white/20 hover:bg-white/30 rounded-xl font-bold">後一天 ▶</button>
                  </div>
                </div>
              </div>

              <div class="bg-white p-5 md:p-8 rounded-2xl border shadow-sm space-y-4 md:space-y-6">
                <h3 class="text-[20px] md:text-[26px] font-bold text-gray-900 border-b pb-3 flex items-center gap-2">
                  <span class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-emerald-700"></span>
                  {focusY}年{focusM}月{focusD}日 行程與會議事件
                </h3>

                <div class="space-y-4">
                  {events.filter(e => e.year === focusY && e.month === focusM && e.day === focusD).map(ev => {
                    const presenterName = parsePresenter(ev.note);
                    return (
                      <div key={ev.id} onClick={() => setSelectedEvent(ev)} class="p-4 md:p-6 rounded-2xl border-l-8 bg-gray-50 space-y-2 cursor-pointer hover:bg-gray-100 transition" style={{ borderColor: ev.color }}>
                        <div class="text-[20px] md:text-[26px] font-bold text-gray-900">{ev.title}</div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-[15px] md:text-[20px] text-gray-700">
                          <div>與會者：<span class="font-bold">{ev.participants || '無'}</span></div>
                          <div>時間：<span class="font-bold text-emerald-800">{ev.time}</span></div>
                          <div>地點：<span class="font-bold">{ev.location || '無'}</span></div>
                          <div>主持醫師：<span class="font-bold">{ev.instructor || '無'}</span></div>
                          <div>報告醫師：<span class="font-bold">{presenterName || '無'}</span></div>
                          <div>紀錄：<span class="font-bold text-emerald-900">{ev.recorder || '無'}</span></div>
                        </div>
                      </div>
                    );
                  })}

                  {events.filter(e => e.year === focusY && e.month === focusM && e.day === focusD).length === 0 && (
                    <div class="text-[18px] md:text-[22px] text-gray-400 py-8 text-center">該日期尚無排定行程事件</div>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* 2. 綜合行事曆 */}
          {currentTab === 'calendar' && (
            <div class="bg-white p-4 md:p-6 rounded-2xl border shadow-sm space-y-4 md:space-y-6">
              <div class="flex flex-wrap justify-between items-center gap-3">
                <div class="flex items-center gap-3">
                  <button onClick={handlePrevMonth} class="px-3 py-1.5 border rounded-xl hover:bg-gray-50 text-[16px] md:text-[20px] font-bold no-print">◀ 上個月</button>
                  <h2 class="text-[18px] md:text-[26px] font-bold text-gray-900">{currentYear} 年 {currentMonth} 月 綜合行事曆</h2>
                  <button onClick={handleNextMonth} class="px-3 py-1.5 border rounded-xl hover:bg-gray-50 text-[16px] md:text-[20px] font-bold no-print">下個月 ▶</button>
                </div>
                <div class="flex gap-2 no-print">
                  {isApproved && (
                    <button onClick={() => { setNewEvent({ editId: null, title: '', participants: '', day: focusD, time: '08:00~09:00', location: '', instructor: '黃仲諄醫師', presenter: '', recorder: '', color: '紅色', isRecurring: false, weeklyDay: 1 }); setShowEventModal(true); }} class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[16px] md:text-[20px] font-bold hover:bg-blue-700">+ 排定事件</button>
                  )}
                  <button onClick={() => window.print()} class="border border-gray-300 px-4 py-2 rounded-xl text-[16px] md:text-[20px] font-bold hover:bg-gray-100 flex items-center gap-1.5">
                    🖨️ 列印全月行事曆
                  </button>
                </div>
              </div>

              {/* 🖨️ 7 欄行事曆 */}
              <div class="grid grid-cols-7 border-t border-l text-[11px] md:text-[18px] print-table">
                {['週日', '週一', '週二', '週三', '週四', '週五', '週六'].map((d, i) => (
                  <div key={d} class={`p-1.5 md:p-3 text-center font-bold border-b border-r bg-gray-50 ${i === 0 || i === 6 ? 'text-red-500' : 'text-gray-800'}`}>{d}</div>
                ))}
                {Array.from({ length: firstDayOfWeek }).map((_, i) => (
                  <div key={'empty-' + i} class="p-1 min-h-[110px] border-b border-r bg-gray-50/20 print-cell"></div>
                ))}
                {Array.from({ length: daysInMonth }).map((_, i) => {
                  const day = i + 1;
                  const dayEvents = events.filter(e => e.year === currentYear && e.month === currentMonth && e.day === day);
                  return (
                    <div key={day} class="p-1.5 md:p-2.5 min-h-[110px] border-b border-r space-y-1.5 hover:bg-blue-50/20 transition print-cell">
                      <div class="font-bold text-gray-900 border-b pb-0.5">{day}日</div>
                      {dayEvents.map(ev => {
                        const presenterName = parsePresenter(ev.note);
                        return (
                          <div 
                            key={ev.id} 
                            onClick={() => setSelectedEvent(ev)} 
                            class="p-2 rounded-lg font-bold cursor-pointer hover:opacity-90 shadow-sm space-y-0.5 text-[11px] md:text-[13px] leading-snug print-event-card border border-gray-300/80" 
                            style={getEventCardStyle(ev)}
                          >
                            <div class="text-[12px] md:text-[14px] border-b border-gray-400/40 pb-0.5 font-extrabold text-gray-900">{ev.title}</div>
                            <div class="text-gray-900">時間：{ev.time}</div>
                            {ev.location && <div class="text-gray-800">地點：{ev.location}</div>}
                            {ev.instructor && <div class="text-gray-800">主持：{ev.instructor}</div>}
                            {presenterName && <div class="text-gray-800">報告：{presenterName}</div>}
                            {ev.participants && <div class="text-gray-800">與會：{ev.participants}</div>}
                            {ev.recorder && <div class="text-gray-800">紀錄：{ev.recorder}</div>}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>

              {/* 說明對照框 */}
              <div class="bg-gray-50 p-3 md:p-5 rounded-2xl border border-gray-300 text-[13px] md:text-[18px] text-gray-800 space-y-0.5 font-medium mt-4">
                <div>&lt;全&gt;中醫部全體主治、實習、住院醫師皆須參加；</div>
                <div>&lt;實住12&gt;實習醫師跟第一年、第二年住院醫師需參加。</div>
                <div>&lt;內&gt;輪訓內科跟當科資深、主治醫師者需參加；</div>
                <div>&lt;針&gt;輪訓針灸科跟當科資深、主治醫師者需參加；</div>
                <div>&lt;傷&gt;輪訓傷科跟資深、當科主治醫師者需參加；</div>
                <div>&lt;婦兒&gt;輪訓婦兒科跟資深、當科主治醫師者需參加；</div>
              </div>
            </div>
          )}

          {/* 3. 跟診表 (📌 補回卡片右上角垃圾桶刪除按鈕) */}
          {currentTab === 'roster' && (
            <div class="space-y-4 md:space-y-6">
              <div class="bg-white p-4 md:p-6 rounded-2xl border shadow-sm space-y-3">
                <div class="flex flex-wrap justify-between items-center gap-3">
                  <div class="flex items-center gap-3">
                    <button onClick={handlePrevMonth} class="px-3 py-1.5 border rounded-xl hover:bg-gray-50 text-[16px] md:text-[20px] font-bold">◀ 上個月</button>
                    <h2 class="text-[18px] md:text-[26px] font-bold text-gray-900">{currentYear} 年 {currentMonth} 月 跟診表</h2>
                    <button onClick={handleNextMonth} class="px-3 py-1.5 border rounded-xl hover:bg-gray-50 text-[16px] md:text-[20px] font-bold">下個月 ▶</button>
                  </div>
                  {isApproved && (
                    <button onClick={() => { setNewRoster({ editId: null, day: focusD, dept: selectedDept, shift: '早診', doctor: '伍崇弘醫師', studentName: '', isTeaching: false, isRecurring: false, selectedSlots: [] }); setShowRosterModal(true); }} class="bg-gray-900 text-white px-4 py-2 rounded-xl text-[16px] md:text-[20px] font-bold">⚙️ 排診 / 批次建立門診</button>
                  )}
                </div>

                <div class="flex gap-2 pt-2 border-t overflow-x-auto no-scrollbar whitespace-nowrap">
                  {['內一', '內二', '婦兒科', '傷科', '針灸科', '王老師打字診'].map(dept => (
                    <button key={dept} onClick={() => setSelectedDept(dept)} class={`px-4 py-2 rounded-xl text-[16px] md:text-[22px] font-bold border transition ${selectedDept === dept ? 'bg-blue-600 text-white border-blue-600 shadow' : 'bg-white text-gray-700'}`}>{dept}</button>
                  ))}
                </div>
              </div>

              {/* 電腦版 7 欄跟診月曆 */}
              <div class="hidden md:grid grid-cols-7 border-t border-l text-[20px] bg-white rounded-2xl overflow-hidden border">
                {['週日', '週一', '週二', '週三', '週四', '週五', '週六'].map(d => (
                  <div key={d} class="p-3 text-center font-bold border-b border-r bg-gray-50 text-gray-800">{d}</div>
                ))}
                {Array.from({ length: firstDayOfWeek }).map((_, i) => (
                  <div key={'e-' + i} class="p-2 min-h-[150px] border-b border-r bg-gray-50/20"></div>
                ))}
                {Array.from({ length: daysInMonth }).map((_, i) => {
                  const day = i + 1;
                  const allDayShifts = rosterShifts.filter(s => s.year === currentYear && s.month === currentMonth && s.day === day && s.dept === selectedDept)
                    .sort((a, b) => ({ '早診': 1, '午診': 2, '晚診': 3 }[a.shift] - { '早診': 1, '午診': 2, '晚診': 3 }[b.shift]));

                  return (
                    <div key={day} onClick={() => { if (isApproved) { setNewRoster({ editId: null, day: day, dept: selectedDept, shift: '早診', doctor: '伍崇弘醫師', studentName: '', isTeaching: false, isRecurring: false, selectedSlots: [] }); setShowRosterModal(true); } }} class="p-2 min-h-[150px] border-b border-r space-y-2 hover:bg-blue-50/30 cursor-pointer">
                      <div class="font-bold text-gray-800">{day}日</div>
                      {allDayShifts.map(shift => (
                        <div key={shift.id} onClick={(e) => handleCardClick(e, shift, day)} class={`border p-2 rounded-xl text-[16px] transition space-y-1 relative group ${getShiftStyle(shift.shift, shift.is_teaching)}`}>
                          <div class="flex justify-between items-center font-bold">
                            <span class="flex items-center gap-1">
                              {shift.doctor} ({shift.shift})
                              {shift.is_teaching && (
                                <span class="text-[11px] bg-pink-600 text-white px-1.5 py-0.5 rounded font-bold">教學診</span>
                              )}
                            </span>
                            {/* 📌 電腦版垃圾桶刪除鈕 */}
                            {isApproved && (
                              <button 
                                onClick={(e) => handleDeleteRoster(e, shift, day)} 
                                class="text-red-500 hover:text-red-700 font-bold text-[14px] p-0.5 rounded hover:bg-red-100/50 transition"
                                title="刪除單診或批次刪除"
                              >
                                🗑️
                              </button>
                            )}
                          </div>
                          <div class="text-[14px]">跟診學員：{shift.students?.length ? shift.students.join('、') : ''}</div>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>

              {/* 手機版跟診表 */}
              <div class="md:hidden space-y-3">
                {Array.from({ length: daysInMonth }).map((_, i) => {
                  const day = i + 1;
                  const dayShifts = rosterShifts.filter(s => s.year === currentYear && s.month === currentMonth && s.day === day && s.dept === selectedDept);
                  if (dayShifts.length === 0) return null;

                  return (
                    <div key={day} class="bg-white p-4 rounded-2xl border shadow-sm space-y-2">
                      <div class="font-bold text-gray-800 text-[18px] border-b pb-2 flex justify-between items-center">
                        <span>{currentMonth}月{day}日（週{['日','一','二','三','四','五','六'][new Date(currentYear, currentMonth-1, day).getDay()]}）</span>
                      </div>
                      <div class="space-y-2">
                        {dayShifts.map(shift => (
                          <div key={shift.id} onClick={(e) => handleCardClick(e, shift, day)} class={`p-3 rounded-xl border ${getShiftStyle(shift.shift, shift.is_teaching)}`}>
                            <div class="flex justify-between items-center">
                              <div class="font-bold text-[18px] flex items-center gap-2">
                                <span>{shift.doctor}（{shift.shift}）</span>
                                {shift.is_teaching && <span class="text-[12px] bg-pink-600 text-white px-2 py-0.5 rounded font-bold">教學診</span>}
                              </div>
                              {isApproved && <button onClick={(e) => handleDeleteRoster(e, shift, day)} class="text-red-500 font-bold p-1">🗑️</button>}
                            </div>
                            <div class="text-[15px] opacity-90 mt-1 font-medium">跟診學員：{shift.students?.length ? shift.students.join('、') : ''}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* 4. 中醫部醫師陣容 */}
          {currentTab === 'personnel' && (
            <div class="bg-white p-5 md:p-8 rounded-2xl border shadow-sm space-y-6">
              <div class="flex justify-between items-center border-b pb-4">
                <div>
                  <h2 class="text-[22px] md:text-[28px] font-bold text-gray-900">中醫部醫師陣容與幹部</h2>
                  <p class="text-[14px] md:text-[18px] text-gray-500 mt-1">
                    {isApproved ? '點擊任何一位醫師的卡片即可進行編輯與修改' : '當月部總、科總、住院醫師、外訓與實習醫師資訊'}
                  </p>
                </div>
                {isApproved && (
                  <button 
                    onClick={() => {
                      setNewPerson({ editId: null, category: 'chiefDepartment', name: '', note: '', deptName: '內一', supervisorDoctor: '', groupCode: 'A', rotationDept: '內一' });
                      setShowPersonnelModal(true);
                    }} 
                    class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[16px] md:text-[20px] font-bold hover:bg-blue-700 shadow"
                  >
                    + 新增醫師
                  </button>
                )}
              </div>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="p-5 rounded-2xl bg-blue-50/80 border border-blue-200 space-y-3 shadow-sm">
                  <h3 class="font-bold text-[20px] md:text-[24px] text-blue-900 border-b border-blue-200 pb-2">當月部總醫師</h3>
                  <div class="space-y-2">
                    {personnelList.filter(p => p.category === 'chiefDepartment').map(p => (
                      <div key={p.id} onClick={() => openEditPersonnelModal(p)} class={`p-3.5 rounded-xl border bg-white flex justify-between items-center transition ${isApproved ? 'hover:border-blue-500 hover:shadow-md cursor-pointer' : ''}`}>
                        <div class="font-bold text-[18px] md:text-[20px] text-gray-800">{p.name} <span class="text-[15px] font-normal text-gray-500">({p.note || '總醫師'})</span></div>
                        {isApproved && <button onClick={(e) => handleDeletePersonnel(e, p.id)} class="text-red-500 font-bold p-1 hover:bg-red-50 rounded">刪除</button>}
                      </div>
                    ))}
                  </div>
                </div>

                <div class="p-5 rounded-2xl bg-indigo-50/80 border border-indigo-200 space-y-3 shadow-sm">
                  <h3 class="font-bold text-[20px] md:text-[24px] text-indigo-900 border-b border-indigo-200 pb-2">當月科總醫師</h3>
                  <div class="space-y-2">
                    {personnelList.filter(p => p.category === 'chiefSections').map(p => (
                      <div key={p.id} onClick={() => openEditPersonnelModal(p)} class={`p-3.5 rounded-xl border bg-white flex justify-between items-center transition ${isApproved ? 'hover:border-indigo-500 hover:shadow-md cursor-pointer' : ''}`}>
                        <div class="font-bold text-[18px] md:text-[20px] text-gray-800">{p.name} <span class="text-[15px] font-normal text-gray-500">({p.note || '科總'})</span></div>
                        {isApproved && <button onClick={(e) => handleDeletePersonnel(e, p.id)} class="text-red-500 font-bold p-1 hover:bg-red-50 rounded">刪除</button>}
                      </div>
                    ))}
                  </div>
                </div>

                <div class="col-span-1 md:col-span-2 p-5 md:p-6 rounded-2xl bg-emerald-50/80 border border-emerald-200 space-y-4 shadow-sm">
                  <h3 class="font-bold text-[22px] md:text-[26px] text-emerald-900 border-b border-emerald-200 pb-2">各科住院醫師</h3>
                  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                    {personnelList.filter(p => p.category === 'residents').map(p => (
                      <div key={p.id} onClick={() => openEditPersonnelModal(p)} class={`p-4 rounded-xl border bg-white space-y-1.5 transition ${isApproved ? 'hover:border-emerald-500 hover:shadow-md cursor-pointer' : ''}`}>
                        <div class="flex justify-between items-center"><span class="font-bold text-[20px] text-emerald-950">{p.name}</span>{isApproved && <button onClick={(e) => handleDeletePersonnel(e, p.id)} class="text-red-500 font-bold p-1">刪除</button>}</div>
                        <div class="text-[15px] text-gray-600 bg-emerald-50/50 p-2 rounded-lg border border-emerald-100">{p.note || '未指定'}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div class="p-5 rounded-2xl bg-amber-50/80 border border-amber-200 space-y-3 shadow-sm">
                  <h3 class="font-bold text-[20px] md:text-[24px] text-amber-900 border-b border-amber-200 pb-2">專科輪訓醫師</h3>
                  <div class="space-y-2">
                    {personnelList.filter(p => p.category === 'specialtyTrainings').map(p => (
                      <div key={p.id} onClick={() => openEditPersonnelModal(p)} class={`p-3.5 rounded-xl border bg-white flex justify-between items-center transition ${isApproved ? 'hover:border-amber-500 hover:shadow-md cursor-pointer' : ''}`}>
                        <div class="font-bold text-[18px] md:text-[20px] text-gray-800">{p.name} <span class="text-[15px] font-normal text-gray-500">({p.note || '輪訓'})</span></div>
                        {isApproved && <button onClick={(e) => handleDeletePersonnel(e, p.id)} class="text-red-500 font-bold p-1 hover:bg-red-50 rounded">刪除</button>}
                      </div>
                    ))}
                  </div>
                </div>

                <div class="p-5 rounded-2xl bg-purple-50/80 border border-purple-200 space-y-3 shadow-sm">
                  <h3 class="font-bold text-[20px] md:text-[24px] text-purple-900 border-b border-purple-200 pb-2">外訓醫師</h3>
                  <div class="space-y-2">
                    {personnelList.filter(p => p.category === 'externalTrainings').map(p => (
                      <div key={p.id} onClick={() => openEditPersonnelModal(p)} class={`p-3.5 rounded-xl border bg-white flex justify-between items-center transition ${isApproved ? 'hover:border-purple-500 hover:shadow-md cursor-pointer' : ''}`}>
                        <div class="font-bold text-[18px] md:text-[20px] text-gray-800">{p.name} <span class="text-[15px] font-normal text-gray-500">({p.note || '外訓'})</span></div>
                        {isApproved && <button onClick={(e) => handleDeletePersonnel(e, p.id)} class="text-red-500 font-bold p-1 hover:bg-red-50 rounded">刪除</button>}
                      </div>
                    ))}
                  </div>
                </div>

                <div class="col-span-1 md:col-span-2 p-5 md:p-6 rounded-2xl bg-teal-50/80 border border-teal-200 space-y-4 shadow-sm">
                  <h3 class="font-bold text-[22px] md:text-[26px] text-teal-900 border-b border-teal-200 pb-2">輪訓實習醫師</h3>
                  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                    {personnelList.filter(p => p.category === 'interns').map(p => (
                      <div key={p.id} onClick={() => openEditPersonnelModal(p)} class={`p-4 rounded-xl border bg-white space-y-2 transition ${isApproved ? 'hover:border-teal-500 hover:shadow-md cursor-pointer' : ''}`}>
                        <div class="flex justify-between items-center"><span class="font-bold text-[20px] text-teal-950">{p.name}</span>{isApproved && <button onClick={(e) => handleDeletePersonnel(e, p.id)} class="text-red-500 font-bold p-1">刪除</button>}</div>
                        <div class="text-[15px] font-bold text-teal-800 bg-teal-50 p-2 rounded-lg border border-teal-100">所屬：{p.note || '未指定'}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 5. 核心課程一覽表 */}
          {currentTab === 'courses' && (
            <div class="bg-white p-4 md:p-6 rounded-2xl border shadow-sm space-y-6 text-[13px] md:text-[15px]">
              <div class="flex flex-wrap justify-between items-center border-b pb-3 gap-3">
                <div>
                  <h2 class="text-[18px] md:text-[22px] font-bold text-gray-900">📚 核心課程一覽表</h2>
                  <p class="text-[12px] md:text-[14px] text-gray-500 mt-0.5">年度核心課程一覽</p>
                </div>
                {isApproved && (
                  <div class="flex gap-2">
                    <button onClick={() => { setNewCourse({ editId: null, isScheduled: true, date: todayStr, instructor: '', content: '', isConfirmed: false }); setShowCourseModal(true); }} class="bg-blue-600 text-white px-3 py-1.5 rounded-xl font-bold hover:bg-blue-700 text-[13px] md:text-[14px]">+ 新增年度課程</button>
                    <button onClick={() => { setNewCourse({ editId: null, isScheduled: false, date: '未定', instructor: '', content: '', isConfirmed: false }); setShowCourseModal(true); }} class="bg-amber-600 text-white px-3 py-1.5 rounded-xl font-bold hover:bg-amber-700 text-[13px] md:text-[14px]">+ 新增未排程課程</button>
                  </div>
                )}
              </div>

              <div class="space-y-3">
                <h3 class="text-[15px] md:text-[17px] font-bold text-blue-900 border-l-4 border-blue-600 pl-2">年度核心課程內容</h3>
                <div class="overflow-x-auto rounded-xl border">
                  <table class="w-full text-left border-collapse">
                    <thead>
                      <tr class="bg-blue-50 text-blue-950 font-bold border-b text-[13px] md:text-[14px]">
                        {isApproved && <th class="p-2.5 border-r w-12 text-center">確認</th>}
                        <th class="p-2.5 border-r w-28 md:w-36">日期</th>
                        <th class="p-2.5 border-r w-28 md:w-36">講師</th>
                        <th class="p-2.5 border-r">課程內容</th>
                        {isApproved && <th class="p-2.5 w-20 text-center">操作</th>}
                      </tr>
                    </thead>
                    <tbody class="divide-y text-[13px] md:text-[14px]">
                      {courses.filter(c => c.is_scheduled).sort((a, b) => (a.course_date || '').localeCompare(b.course_date || '')).map(c => (
                        <tr key={c.id} class={`hover:bg-gray-50 transition ${c.is_confirmed ? 'font-bold bg-blue-50/30' : ''}`}>
                          {isApproved && (
                            <td class="p-2.5 border-r text-center">
                              <input type="checkbox" checked={c.is_confirmed || false} onChange={() => handleToggleCourseConfirmed(c)} class="w-4 h-4 accent-blue-600 cursor-pointer" />
                            </td>
                          )}
                          <td class="p-2.5 border-r text-gray-800">{c.course_date || '未定'}</td>
                          <td class="p-2.5 border-r text-gray-900">{c.instructor || '無'}</td>
                          <td class="p-2.5 border-r text-gray-800 whitespace-pre-line">{c.content}</td>
                          {isApproved && (
                            <td class="p-2.5 text-center space-x-1 whitespace-nowrap">
                              <button onClick={() => openEditCourseModal(c)} class="text-blue-600 hover:underline">編輯</button>
                              <button onClick={() => handleDeleteCourse(c.id)} class="text-red-500 hover:underline">刪除</button>
                            </td>
                          )}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              <div class="space-y-3 pt-4 border-t">
                <h3 class="text-[15px] md:text-[17px] font-bold text-amber-900 border-l-4 border-amber-600 pl-2">尚未排程課程</h3>
                <div class="overflow-x-auto rounded-xl border">
                  <table class="w-full text-left border-collapse">
                    <thead>
                      <tr class="bg-amber-50 text-amber-950 font-bold border-b text-[13px] md:text-[14px]">
                        <th class="p-2.5 border-r w-28 md:w-36">預計/備註日期</th>
                        <th class="p-2.5 border-r w-28 md:w-36">講師</th>
                        <th class="p-2.5 border-r">課程內容</th>
                        {isApproved && <th class="p-2.5 w-20 text-center">操作</th>}
                      </tr>
                    </thead>
                    <tbody class="divide-y text-[13px] md:text-[14px]">
                      {courses.filter(c => !c.is_scheduled).map(c => (
                        <tr key={c.id} class="hover:bg-gray-50 transition">
                          <td class="p-2.5 border-r text-gray-700">{c.course_date || '未定'}</td>
                          <td class="p-2.5 border-r font-medium text-gray-900">{c.instructor || '無'}</td>
                          <td class="p-2.5 border-r text-gray-800 whitespace-pre-line">{c.content}</td>
                          {isApproved && (
                            <td class="p-2.5 text-center space-x-1 whitespace-nowrap">
                              <button onClick={() => openEditCourseModal(c)} class="text-blue-600 hover:underline">編輯</button>
                              <button onClick={() => handleDeleteCourse(c.id)} class="text-red-500 hover:underline">刪除</button>
                            </td>
                          )}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {/* 6. 重要規範 */}
          {currentTab === 'rules' && (
            <div class="bg-white p-5 md:p-8 rounded-2xl border shadow-sm space-y-6">
              <h2 class="text-[22px] md:text-[28px] font-bold text-gray-900 border-b pb-3">本院醫師重要規範</h2>
              <div class="p-5 md:p-7 rounded-2xl border bg-gray-50 space-y-4 text-[16px] md:text-[20px] leading-relaxed text-gray-800">
                <div class="font-bold text-[18px] md:text-[22px] text-gray-900 border-b pb-2">❖ 會議注意事項：</div>
                <ol class="list-decimal list-inside space-y-3 pl-1">
                  <li>住院醫師及實習醫師病例及期刊報告請於3日前寄出初稿給全體中醫部醫師。</li>
                  <li>中醫部行政會議、聯合視訊會議：實習醫師不參加。</li>
                  <li>大內科行政會議：內婦兒科住院醫師、內婦兒科主治醫師必須參加，輪訓內婦兒科住院醫師及實習醫師不強制參加。</li>
                  <li>針傷科行政會議：針傷科主治醫師、住院醫師、護理人員必須參加，輪訓針傷科住院醫師及實習醫師不強制參加。</li>
                  <li>新思維教育講座：請實習醫師、住院醫師(R1-R2)及內科資深住院醫師必須參加，請紀錄者紀錄並錄影後將影像檔存至中醫部隨身硬碟。</li>
                  <li>須彌山講座：經專家同意後錄影，請紀錄者紀錄並錄影後將影像檔存至中醫部硬碟。請負責須彌山紀錄的醫師準備講者的茶水，並檢查麥克風正常運作與否。</li>
                  <li>輪訓藥局醫師仍需參與科內(內二)報告，離開藥局前請先報請中藥局主任。輪訓中藥局的實習醫師不必交病例報告，但是每周要交一篇A4兩面的心得報告。</li>
                </ol>
              </div>
            </div>
          )}

          {/* 7. 部上公佈欄 */}
          {currentTab === 'bulletin' && (
            <div class="bg-white p-5 md:p-6 rounded-2xl border shadow-sm space-y-4">
              <div class="flex justify-between items-center border-b pb-3">
                <h2 class="text-[22px] md:text-[26px] font-bold text-gray-900">部上事務公佈欄</h2>
                {isApproved && <button onClick={() => setShowBulletinModal(true)} class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[16px] md:text-[20px] font-bold">+ 發布公告</button>}
              </div>
              <div class="space-y-3">
                {bulletins.map(item => (
                  <div key={item.id} class={`p-4 rounded-2xl border space-y-2 ${item.level === '重要' ? 'bg-red-50/50 border-red-200' : 'bg-gray-50'}`}>
                    <h3 class="font-bold text-[18px] md:text-[24px]">{item.title}</h3>
                    <p class="text-[16px] md:text-[22px] text-gray-700 whitespace-pre-line">{item.content}</p>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Modal：事件詳情 */}
          {selectedEvent && (
            <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 no-print" onClick={() => setSelectedEvent(null)}>
              <div class="bg-white rounded-3xl max-w-xl w-full p-6 md:p-8 space-y-4 shadow-2xl relative" onClick={e => e.stopPropagation()}>
                <div class="flex justify-between items-start border-b pb-3">
                  <h3 class="font-bold text-[22px] md:text-[28px] text-gray-900">{selectedEvent.title}</h3>
                  <button onClick={() => setSelectedEvent(null)} class="text-gray-400 font-bold text-[24px]">✕</button>
                </div>
                <div class="space-y-3 text-[18px] md:text-[22px] text-gray-800">
                  <div>與會者：<strong>{selectedEvent.participants || '無'}</strong></div>
                  <div>時間：<strong class="text-emerald-800">{selectedEvent.time}</strong></div>
                  <div>地點：<strong>{selectedEvent.location || '無'}</strong></div>
                  <div>主持醫師：<strong>{selectedEvent.instructor || '無'}</strong></div>
                  <div>報告醫師：<strong>{parsePresenter(selectedEvent.note) || '無'}</strong></div>
                  <div>紀錄：<strong>{selectedEvent.recorder || '無'}</strong></div>
                </div>
                <div class="flex justify-between items-center pt-3 border-t">
                  {isApproved ? (
                    <div class="flex gap-2">
                      <button onClick={() => openEditEventModal(selectedEvent)} class="px-4 py-2 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-xl font-bold">編輯事件</button>
                      <button onClick={() => handleDeleteEvent(selectedEvent)} class="px-4 py-2 bg-red-50 text-red-600 hover:bg-red-100 rounded-xl font-bold">刪除</button>
                    </div>
                  ) : <div></div>}
                  <button onClick={() => setSelectedEvent(null)} class="px-5 py-2 bg-blue-600 text-white rounded-xl font-bold">關閉</button>
                </div>
              </div>
            </div>
          )}

          {/* Modal：排定/編輯事件 */}
          {showEventModal && isApproved && (
            <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-3 md:p-4 z-50 no-print">
              <div class="bg-white rounded-3xl max-w-xl w-full p-6 md:p-8 space-y-4 shadow-2xl max-h-[90vh] overflow-y-auto">
                <h3 class="font-bold text-[22px] md:text-[26px] text-gray-900 border-b pb-3">
                  {newEvent.editId ? '編輯行事曆事件' : '排定行事曆事件'}
                </h3>
                <form onSubmit={handleSaveEvent} class="space-y-4 text-[16px] md:text-[18px]">
                  {!newEvent.editId && (
                    <div class="bg-gray-100 p-2 rounded-xl flex gap-2">
                      <button type="button" onClick={() => setNewEvent({...newEvent, isRecurring: false})} class={`flex-1 py-2 rounded-lg font-bold ${!newEvent.isRecurring ? 'bg-white shadow text-blue-600' : 'text-gray-600'}`}>指定單日事件</button>
                      <button type="button" onClick={() => setNewEvent({...newEvent, isRecurring: true})} class={`flex-1 py-2 rounded-lg font-bold ${newEvent.isRecurring ? 'bg-white shadow text-blue-600' : 'text-gray-600'}`}>批次每週重複事件</button>
                    </div>
                  )}

                  <div>
                    <label class="block text-gray-700 font-bold mb-1">色彩等級</label>
                    <select value={newEvent.color} onChange={e => setNewEvent({...newEvent, color: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold">
                      <option value="紅色">紅色（高度重要）</option>
                      <option value="黃色">黃色（中度重要）</option>
                      <option value="綠色">綠色（一般事件）</option>
                    </select>
                  </div>

                  {newEvent.isRecurring ? (
                    <div>
                      <label class="block text-blue-900 font-bold mb-1">當月每週幾固定舉行？</label>
                      <select value={newEvent.weeklyDay} onChange={e => setNewEvent({...newEvent, weeklyDay: e.target.value})} class="w-full border rounded-xl p-3 bg-blue-50 font-bold">
                        <option value="1">週一</option><option value="2">週二</option><option value="3">週三</option><option value="4">週四</option><option value="5">週五</option><option value="6">週六</option><option value="0">週日</option>
                      </select>
                    </div>
                  ) : (
                    <div>
                      <label class="block text-gray-700 font-bold mb-1">日期 (幾號)</label>
                      <input type="number" min="1" max={daysInMonth} value={newEvent.day} onChange={e => setNewEvent({...newEvent, day: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold" />
                    </div>
                  )}

                  <div><label class="block text-gray-700 font-bold mb-1">標題</label><input type="text" value={newEvent.title} onChange={e => setNewEvent({...newEvent, title: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold" required placeholder="如：須彌山講座" /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">與會者</label><input type="text" value={newEvent.participants} onChange={e => setNewEvent({...newEvent, participants: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" placeholder="如：全體醫師、實習醫師" /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">時間</label><input type="text" value={newEvent.time} onChange={e => setNewEvent({...newEvent, time: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold" placeholder="如：07:30~08:30" /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">地點</label><input type="text" value={newEvent.location} onChange={e => setNewEvent({...newEvent, location: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" placeholder="如：第一會議室" /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">主持醫師</label><input type="text" value={newEvent.instructor} onChange={e => setNewEvent({...newEvent, instructor: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" placeholder="如：黃仲諄主任" /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">報告醫師</label><input type="text" value={newEvent.presenter} onChange={e => setNewEvent({...newEvent, presenter: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" placeholder="如：張醫師" /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">紀錄</label><input type="text" value={newEvent.recorder} onChange={e => setNewEvent({...newEvent, recorder: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" placeholder="如：蕭醫師" /></div>

                  <div class="flex justify-end gap-3 pt-3">
                    <button type="button" onClick={() => setShowEventModal(false)} class="px-5 py-2.5 border rounded-xl font-bold text-gray-600">取消</button>
                    <button type="submit" class="px-5 py-2.5 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700">儲存事件</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Modal：跟診診次設定 */}
          {showRosterModal && isApproved && (
            <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-3 md:p-4 z-50 no-print">
              <div class="bg-white rounded-3xl max-w-2xl w-full p-5 md:p-8 space-y-4 shadow-2xl max-h-[90vh] overflow-y-auto">
                <h3 class="font-bold text-[20px] md:text-[26px] text-gray-900 border-b pb-3">
                  {newRoster.editId ? `編輯單診資料` : `新增 / 批次建立門診`}
                </h3>
                <form onSubmit={handleSaveRoster} class="space-y-4 text-[16px] md:text-[20px]">
                  {!newRoster.editId && (
                    <div class="bg-gray-100 p-2 rounded-xl flex gap-2">
                      <button type="button" onClick={() => setNewRoster({...newRoster, isRecurring: false})} class={`flex-1 py-2 rounded-lg font-bold ${!newRoster.isRecurring ? 'bg-white shadow text-blue-600' : 'text-gray-600'}`}>指定單日門診</button>
                      <button type="button" onClick={() => setNewRoster({...newRoster, isRecurring: true})} class={`flex-1 py-2 rounded-lg font-bold ${newRoster.isRecurring ? 'bg-white shadow text-blue-600' : 'text-gray-600'}`}>複選多時段 (建全月)</button>
                    </div>
                  )}

                  <div>
                    <label class="block text-gray-700 font-bold mb-1">跟診主治醫師</label>
                    <input type="text" value={newRoster.doctor} onChange={e => setNewRoster({...newRoster, doctor: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold" required />
                  </div>

                  <div class="flex items-center gap-3 bg-pink-50 p-3.5 rounded-2xl border border-pink-200">
                    <input 
                      type="checkbox" 
                      id="isTeachingCheck" 
                      checked={newRoster.isTeaching} 
                      onChange={e => setNewRoster({...newRoster, isTeaching: e.target.checked})} 
                      class="w-5 h-5 accent-pink-600 cursor-pointer" 
                    />
                    <label htmlFor="isTeachingCheck" class="font-bold text-pink-900 text-[16px] md:text-[18px] cursor-pointer">
                      開通為「教學診」（勾選後呈現粉紅色背景與專屬標籤）
                    </label>
                  </div>

                  {newRoster.isRecurring && !newRoster.editId ? (
                    <div class="space-y-3 bg-blue-50/60 p-4 rounded-2xl border border-blue-200">
                      <label class="block text-blue-900 font-bold text-[16px] md:text-[18px]">請勾選當月固定門診時段：</label>

                      <div class="hidden md:block overflow-x-auto">
                        <table class="w-full text-center bg-white rounded-xl overflow-hidden border">
                          <thead>
                            <tr class="bg-blue-100 text-blue-900 font-bold">
                              <th class="p-2 border">診別</th>
                              {['週一', '週二', '週三', '週四', '週五', '週六'].map(d => <th key={d} class="p-2 border">{d}</th>)}
                            </tr>
                          </thead>
                          <tbody>
                            {['早診', '午診', '晚診'].map(shift => (
                              <tr key={shift} class="border-t">
                                <td class="p-2 font-bold bg-gray-50 border">{shift}</td>
                                {[1, 2, 3, 4, 5, 6].map(w => {
                                  const isChecked = newRoster.selectedSlots.some(s => s.weeklyDay === w && s.shift === shift);
                                  return (
                                    <td key={w} class="p-2 border hover:bg-blue-50 cursor-pointer" onClick={() => handleToggleSlot(w, shift)}>
                                      <input type="checkbox" checked={isChecked} onChange={() => {}} class="w-5 h-5 accent-blue-600 cursor-pointer" />
                                    </td>
                                  );
                                })}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>

                      <div class="grid grid-cols-2 gap-2 md:hidden">
                        {['週一', '週二', '週三', '週四', '週五', '週六'].map((dayName, index) => {
                          const w = index + 1;
                          return (
                            <div key={w} class="bg-white p-2.5 rounded-xl border space-y-1.5">
                              <div class="font-bold text-blue-900 border-b pb-1 text-center text-[15px]">{dayName}</div>
                              {['早診', '午診', '晚診'].map(shift => {
                                const isChecked = newRoster.selectedSlots.some(s => s.weeklyDay === w && s.shift === shift);
                                return (
                                  <button
                                    key={shift}
                                    type="button"
                                    onClick={() => handleToggleSlot(w, shift)}
                                    class={`w-full py-1.5 rounded-lg text-[13px] font-bold border transition ${
                                      isChecked ? 'bg-blue-600 text-white border-blue-600' : 'bg-gray-50 text-gray-700'
                                    }`}
                                  >
                                    {shift} {isChecked ? '✓' : ''}
                                  </button>
                                );
                              })}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ) : (
                    <div class="grid grid-cols-2 gap-3">
                      <div><label class="block text-gray-700 font-bold mb-1">日期 (幾號)</label><input type="number" min="1" max={daysInMonth} value={newRoster.day} onChange={e => setNewRoster({...newRoster, day: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold" /></div>
                      <div><label class="block text-gray-700 font-bold mb-1">診別</label><select value={newRoster.shift} onChange={e => setNewRoster({...newRoster, shift: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold"><option value="早診">早診</option><option value="午診">午診</option><option value="晚診">晚診</option></select></div>
                    </div>
                  )}

                  <div>
                    <label class="block text-gray-700 font-bold mb-1">跟診學員名單</label>
                    <input type="text" value={newRoster.studentName} onChange={e => setNewRoster({...newRoster, studentName: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold" placeholder="例如：沈小花、張小明" />
                  </div>

                  <div class="flex justify-end gap-3 pt-3">
                    <button type="button" onClick={() => setShowRosterModal(false)} class="px-5 py-2.5 border rounded-xl font-bold text-gray-600">取消</button>
                    <button type="submit" class="px-5 py-2.5 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700">儲存</button>
                  </div>
                </form>
              </div>
