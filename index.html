            </div>
          )}

          {/* Modal：新增/修改 醫師 */}
          {showPersonnelModal && isApproved && (
            <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 no-print">
              <div class="bg-white rounded-3xl max-w-xl w-full p-6 space-y-4 shadow-2xl">
                <h3 class="font-bold text-[22px] text-gray-900 border-b pb-3">{newPerson.editId ? '修改醫師資料' : '新增醫師名單'}</h3>
                <form onSubmit={handleSavePersonnel} class="space-y-4 text-[16px] md:text-[18px]">
                  <div>
                    <label class="block text-gray-700 font-bold mb-1">醫師類別</label>
                    <select value={newPerson.category} onChange={e => setNewPerson({...newPerson, category: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold">
                      <option value="chiefDepartment">當月部總醫師</option>
                      <option value="chiefSections">當月科總醫師</option>
                      <option value="residents">各科住院醫師</option>
                      <option value="specialtyTrainings">專科輪訓醫師</option>
                      <option value="externalTrainings">外訓醫師</option>
                      <option value="interns">輪訓實習醫師</option>
                    </select>
                  </div>
                  <div>
                    <label class="block text-gray-700 font-bold mb-1">醫師姓名</label>
                    <input type="text" value={newPerson.name} onChange={e => setNewPerson({...newPerson, name: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold" required />
                  </div>
                  <div class="flex justify-end gap-3 pt-3">
                    <button type="button" onClick={() => setShowPersonnelModal(false)} class="px-5 py-2.5 border rounded-xl font-bold">取消</button>
                    <button type="submit" class="px-5 py-2.5 bg-blue-600 text-white font-bold rounded-xl">儲存變更</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Modal：新增/編輯 核心課程 */}
          {showCourseModal && isApproved && (
            <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 no-print">
              <div class="bg-white rounded-3xl max-w-lg w-full p-6 space-y-4 shadow-2xl">
                <h3 class="font-bold text-[20px] text-gray-900 border-b pb-3">{newCourse.editId ? '✏️ 編輯核心課程' : '📚 新增核心課程'}</h3>
                <form onSubmit={handleSaveCourse} class="space-y-3 text-[15px]">
                  <div>
                    <label class="block text-gray-700 font-bold mb-1">課程歸類</label>
                    <select value={newCourse.isScheduled ? 'true' : 'false'} onChange={e => setNewCourse({...newCourse, isScheduled: e.target.value === 'true'})} class="w-full border rounded-xl p-2.5 bg-gray-50 font-bold">
                      <option value="true">年度核心課程內容</option>
                      <option value="false">尚未排程課程</option>
                    </select>
                  </div>
                  <div><label class="block text-gray-700 font-bold mb-1">日期（或備註時間）</label><input type="text" value={newCourse.date} onChange={e => setNewCourse({...newCourse, date: e.target.value})} class="w-full border rounded-xl p-2.5 bg-gray-50" required /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">講師</label><input type="text" value={newCourse.instructor} onChange={e => setNewCourse({...newCourse, instructor: e.target.value})} class="w-full border rounded-xl p-2.5 bg-gray-50" /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">課程內容</label><textarea value={newCourse.content} onChange={e => setNewCourse({...newCourse, content: e.target.value})} class="w-full border rounded-xl p-2.5 bg-gray-50 h-24" required></textarea></div>
                  <div class="flex justify-end gap-3 pt-2 border-t"><button type="button" onClick={() => setShowCourseModal(false)} class="px-4 py-2 border rounded-xl font-bold">取消</button><button type="submit" class="px-5 py-2 bg-blue-600 text-white font-bold rounded-xl">儲存變更</button></div>
                </form>
              </div>
            </div>
          )}

          {/* Modal：公告 */}
          {showBulletinModal && isApproved && (
            <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 no-print">
              <div class="bg-white rounded-3xl max-w-xl w-full p-6 space-y-4 shadow-2xl">
                <h3 class="font-bold text-[22px] text-gray-900 border-b pb-3">發布公告</h3>
                <form onSubmit={handleAddBulletin} class="space-y-3">
                  <div><label class="block text-gray-700 font-bold mb-1">標題</label><input type="text" value={newBulletin.title} onChange={e => setNewBulletin({...newBulletin, title: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" required /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">內容</label><textarea value={newBulletin.content} onChange={e => setNewBulletin({...newBulletin, content: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 h-28" required></textarea></div>
                  <div class="flex justify-end gap-3 pt-3"><button type="button" onClick={() => setShowBulletinModal(false)} class="px-5 py-2.5 border rounded-xl font-bold">取消</button><button type="submit" class="px-5 py-2 bg-blue-600 text-white font-bold rounded-xl">發布</button></div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
