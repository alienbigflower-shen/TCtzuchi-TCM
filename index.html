<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>醫療部務與跟診排班系統 - 臺中慈濟醫院中醫部</title>
  <!-- Tailwind CSS 樣式庫 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 與 Supabase SDK -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @media print {
      .no-print { display: none !important; }
      body { background-color: white !important; padding: 0 !important; }
      .shadow-sm, .border, .shadow { box-shadow: none !important; border-color: #ddd !important; }
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen p-4 md:p-8 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 🔗 連線至 Supabase (Project ID: htmectgbwqvvuvrajsln)
    const SUPABASE_URL = 'https://htmectgbwqvvuvrajsln.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0bWVjdGdid3F2dnV2cmFqc2xuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MjMyOTksImV4cCI6MjEwMDE5OTI5OX0.5Kd47QjwR_E1Q9yEorLzb49blW-EfpzDmcobP2QjfMw
'; // ⚠️ 請務必替換為 Supabase 的 anon public key
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function App() {
      const [user, setUser] = useState(null);
      const [isApproved, setIsApproved] = useState(false);
      const [loading, setLoading] = useState(true);

      const [currentTab, setCurrentTab] = useState('today');
      const [currentYear, setCurrentYear] = useState(2026);
      const [currentMonth, setCurrentMonth] = useState(7);
      const [selectedDept, setSelectedDept] = useState('內一');
      const [focusDate, setFocusDate] = useState('2026-07-22');

      // 資料庫動態資料集
      const [events, setEvents] = useState([]);
      const [rosterShifts, setRosterShifts] = useState([]);
      const [bulletins, setBulletins] = useState([]);
      const [personnelList, setPersonnelList] = useState([]);

      // 彈窗狀態
      const [showEventModal, setShowEventModal] = useState(false);
      const [showRosterModal, setShowRosterModal] = useState(false);
      const [showBulletinModal, setShowBulletinModal] = useState(false);
      const [showPersonnelModal, setShowPersonnelModal] = useState(false);
      const [selectedEvent, setSelectedEvent] = useState(null);

      // 表單狀態
      const [newEvent, setNewEvent] = useState({ editId: null, title: '', day: 22, time: '08:00~09:00', location: '', instructor: '黃仲諄醫師', recorder: '', participants: '', note: '', level: '🔴 高度重要', isRecurring: false, weeklyDay: 1 });
      const [newRoster, setNewRoster] = useState({ editId: null, day: 22, dept: '內一', shift: '早診', doctor: '莊佳穎醫師', studentName: '', isRecurring: false, weeklyDay: 1 });
      const [newBulletin, setNewBulletin] = useState({ title: '', content: '', author: '黃仲諄醫師', level: '普通' });
      const [newPerson, setNewPerson] = useState({ category: 'chiefDepartment', name: '', note: '' });

      // 🎨 依診別切換柔和顏色的 Helper Function
      const getShiftStyle = (shiftName) => {
        if (shiftName === '早診') return 'bg-amber-50/90 border-amber-200 text-amber-900 hover:border-amber-400';
        if (shiftName === '午診') return 'bg-sky-50/90 border-sky-200 text-sky-900 hover:border-sky-400';
        if (shiftName === '晚診') return 'bg-purple-50/90 border-purple-200 text-purple-900 hover:border-purple-400';
        return 'bg-blue-50/90 border-blue-200 text-blue-900 hover:border-blue-400';
      };

      // 🔐 初始化權限與載入 Supabase 資料
      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          const currentUser = session?.user ?? null;
          setUser(currentUser);
          if (currentUser) checkApproval(currentUser.email);
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          const currentUser = session?.user ?? null;
          setUser(currentUser);
          if (currentUser) checkApproval(currentUser.email);
          else setIsApproved(false);
        });

        fetchAllData();
        return () => subscription.unsubscribe();
      }, []);

const checkApproval = async (email) => {
  if (!email) return setIsApproved(false);
  // 將登入的 email 強制轉為小寫再查詢
  const cleanEmail = email.trim().toLowerCase();
  const { data } = await supabase
    .from('approved_users')
    .select('email')
    .ilike('email', cleanEmail) // ilike 為不分大小寫比對
    .maybeSingle();

  setIsApproved(!!data);
};
      const fetchAllData = async () => {
        setLoading(true);
        const { data: evData } = await supabase.from('events').select('*');
        if (evData) setEvents(evData);

        const { data: roData } = await supabase.from('roster_shifts').select('*');
        if (roData) setRosterShifts(roData);

        const { data: buData } = await supabase.from('bulletins').select('*').order('id', { ascending: false });
        if (buData) setBulletins(buData);

        const { data: peData } = await supabase.from('personnel').select('*');
        if (peData) setPersonnelList(peData);

        setLoading(false);
      };

      // 📅 綜合行事曆儲存
      const handleSaveEvent = async (e) => {
        e.preventDefault();
        if (!isApproved) return alert('權限不足！');
        if (!newEvent.title) return alert('請填寫事件名稱！');

        const colorMap = { '🔴 高度重要': '#EF4444', '🟡 中度重要': '#EAB308', '🟢 一般事件': '#10B981' };
        
        if (newEvent.isRecurring && !newEvent.editId) {
          const targetDayOfWeek = parseInt(newEvent.weeklyDay);
          const totalDays = new Date(currentYear, currentMonth, 0).getDate();
          const batchItems = [];

          for (let d = 1; d <= totalDays; d++) {
            const w = new Date(currentYear, currentMonth - 1, d).getDay();
            if (w === targetDayOfWeek) {
              batchItems.push({
                year: currentYear,
                month: currentMonth,
                day: d,
                title: newEvent.title,
                time: newEvent.time,
                location: newEvent.location,
                instructor: newEvent.instructor,
                recorder: newEvent.recorder,
                participants: newEvent.participants,
                note: newEvent.note,
                level: newEvent.level,
                color: colorMap[newEvent.level] || '#3B82F6',
                is_recurring: true,
                weekly_day: targetDayOfWeek
              });
            }
          }

          const { data, error } = await supabase.from('events').insert(batchItems).select();
          if (error) {
            alert('批次新增失敗：' + error.message);
          } else if (data) {
            setEvents([...events, ...data]);
            alert(`已成功批次為當月所有【週${['日','一','二','三','四','五','六'][targetDayOfWeek]}】建立獨立事件！`);
          }
        } else {
          const item = {
            year: currentYear,
            month: currentMonth,
            day: parseInt(newEvent.day),
            title: newEvent.title,
            time: newEvent.time,
            location: newEvent.location,
            instructor: newEvent.instructor,
            recorder: newEvent.recorder,
            participants: newEvent.participants,
            note: newEvent.note,
            level: newEvent.level,
            color: colorMap[newEvent.level] || '#3B82F6',
            is_recurring: false,
            weekly_day: new Date(currentYear, currentMonth - 1, parseInt(newEvent.day)).getDay()
          };

          if (newEvent.editId) {
            const { data, error } = await supabase.from('events').update(item).eq('id', newEvent.editId).select();
            if (!error && data) {
              setEvents(events.map(ev => ev.id === newEvent.editId ? data[0] : ev));
              setSelectedEvent(data[0]);
              alert('事件更新成功！');
            }
          } else {
            const { data, error } = await supabase.from('events').insert([item]).select();
            if (!error && data) {
              setEvents([...events, data[0]]);
              alert('事件新增成功！');
            }
          }
        }

        setShowEventModal(false);
        setNewEvent({ editId: null, title: '', day: 22, time: '08:00~09:00', location: '', instructor: '黃仲諄醫師', recorder: '', participants: '', note: '', level: '🔴 高度重要', isRecurring: false, weeklyDay: 1 });
      };

      const handleDeleteEvent = async (ev) => {
        if (!isApproved) return alert('權限不足！');
        
        if (ev.is_recurring) {
          const opt = prompt(`刪除每週固定事件【${ev.title}】\n\n[1] 僅刪除 ${ev.month}/${ev.day} 此單日事件\n[2] 批次刪除包含今日與後續所有相同事件`, "1");
          if (opt === '1') {
            await supabase.from('events').delete().eq('id', ev.id);
            setEvents(events.filter(e => e.id !== ev.id));
            setSelectedEvent(null);
          } else if (opt === '2') {
            const { error } = await supabase.from('events').delete()
              .eq('title', ev.title)
              .eq('year', currentYear)
              .gte('month', ev.month)
              .gte('day', ev.day);
            
            if (!error) {
              setEvents(events.filter(e => !(e.title === ev.title && e.year === currentYear && ((e.month === ev.month && e.day >= ev.day) || e.month > ev.month))));
              setSelectedEvent(null);
              alert('已成功批次刪除所有後續重複事件！');
            }
          }
        } else {
          if (confirm('確定要刪除此行事曆事件嗎？')) {
            await supabase.from('events').delete().eq('id', ev.id);
            setEvents(events.filter(e => e.id !== ev.id));
            setSelectedEvent(null);
          }
        }
      };

      const openEditEventModal = (ev) => {
        setNewEvent({
          editId: ev.id,
          title: ev.title || '',
          day: ev.day || 1,
          time: ev.time || '',
          location: ev.location || '',
          instructor: ev.instructor || '',
          recorder: ev.recorder || '',
          participants: ev.participants || '',
          note: ev.note || '',
          level: ev.level || '🔴 高度重要',
          isRecurring: false,
          weeklyDay: ev.weekly_day || 1
        });
        setSelectedEvent(null);
        setShowEventModal(true);
      };

      // 🩺 修復跟診表：精確區隔「單診編輯」與「新增批次」
      const handleSaveRoster = async (e) => {
        e.preventDefault();
        if (!isApproved) return alert('權限不足！僅限管理醫師/總醫師操作');

        const studentsArr = newRoster.studentName ? newRoster.studentName.split(/[,、\s]+/).map(s => s.trim()).filter(Boolean) : [];

        // 情境 A：編輯特定卡片（絕對嚴格只更動單一卡片 ID）
        if (newRoster.editId) {
          const { data, error } = await supabase
            .from('roster_shifts')
            .update({ 
              doctor: newRoster.doctor, 
              shift: newRoster.shift, 
              students: studentsArr,
              day: parseInt(newRoster.day)
            })
            .eq('id', newRoster.editId)
            .select();

          if (error) {
            alert('更新單診失敗：' + error.message);
          } else if (data) {
            setRosterShifts(rosterShifts.map(s => s.id === newRoster.editId ? data[0] : s));
            alert(`已成功獨立更新 ${currentMonth}/${newRoster.day} 的跟診學生！其他週次不受影響。`);
          }
        } 
        // 情境 B：全新批次建立（依星期幾批次產生多張實體卡片）
        else if (newRoster.isRecurring) {
          const targetDayOfWeek = parseInt(newRoster.weeklyDay);
          const totalDays = new Date(currentYear, currentMonth, 0).getDate();
          const batchGroupId = 'grp_' + Date.now();
          const batchShifts = [];

          for (let d = 1; d <= totalDays; d++) {
            const w = new Date(currentYear, currentMonth - 1, d).getDay();
            if (w === targetDayOfWeek) {
              batchShifts.push({
                id: 's_' + Date.now() + '_' + d + '_' + Math.random().toString(36).substring(2, 7),
                group_id: batchGroupId,
                year: currentYear,
                month: currentMonth,
                day: d,
                dept: selectedDept,
                shift: newRoster.shift,
                doctor: newRoster.doctor,
                students: studentsArr,
                is_recurring: true,
                weekly_day: targetDayOfWeek
              });
            }
          }

          const { data, error } = await supabase.from('roster_shifts').insert(batchShifts).select();
          if (error) {
            alert('批次新增診次失敗：' + error.message);
          } else if (data) {
            setRosterShifts([...rosterShifts, ...data]);
            alert(`已成功批次建立【${newRoster.doctor}】當月所有週${['日','一','二','三','四','五','六'][targetDayOfWeek]}的獨立門診！每個日期現在都可以獨立點擊修改跟診學生了。`);
          }
        } 
        // 情境 C：新增單日診次
        else {
          const item = {
            id: 's_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7),
            group_id: null,
            year: currentYear, 
            month: currentMonth, 
            day: parseInt(newRoster.day),
            dept: selectedDept, 
            shift: newRoster.shift, 
            doctor: newRoster.doctor,
            students: studentsArr, 
            is_recurring: false, 
            weekly_day: new Date(currentYear, currentMonth - 1, parseInt(newRoster.day)).getDay()
          };

          const { data, error } = await supabase.from('roster_shifts').insert([item]).select();
          if (!error && data) {
            setRosterShifts([...rosterShifts, data[0]]);
            alert('已成功新增單日門診！');
          }
        }

        setShowRosterModal(false);
        setNewRoster({ editId: null, day: 22, dept: selectedDept, shift: '早診', doctor: '莊佳穎醫師', studentName: '', isRecurring: false, weeklyDay: 1 });
      };

      const handleCardClick = (e, shift, day) => {
        e.stopPropagation();
        if (isApproved) {
          setNewRoster({
            editId: shift.id,
            day: day,
            dept: selectedDept,
            shift: shift.shift,
            doctor: shift.doctor,
            studentName: shift.students ? shift.students.join(', ') : '',
            isRecurring: false,
            weeklyDay: shift.weekly_day || 1
          });
          setShowRosterModal(true);
        } else {
          toggleBookingStudent(shift);
        }
      };

      const toggleBookingStudent = async (shift) => {
        if (!user) return alert('請先使用 Google 帳號登入！');
        const name = user.user_metadata?.full_name || user.email.split('@')[0];
        let updatedStudents = [...(shift.students || [])];

        if (updatedStudents.includes(name)) {
          if (!confirm(`確定要取消認領 ${shift.doctor} (${shift.shift}) 的跟診嗎？`)) return;
          updatedStudents = updatedStudents.filter(n => n !== name);
        } else {
          if (updatedStudents.length >= 2) return alert('該診次跟診名額已滿（上限 2 人）！');
          updatedStudents.push(name);
        }

        await supabase.from('roster_shifts').update({ students: updatedStudents }).eq('id', shift.id);
        setRosterShifts(rosterShifts.map(s => s.id === shift.id ? { ...s, students: updatedStudents } : s));
      };

      // 🗑️ 刪除診次：選項 [1] 單診刪除，選項 [2] 批次刪除包含此診與後續同醫師診次
      const handleDeleteRoster = async (e, shift, day) => {
        e.stopPropagation();
        if (!isApproved) return alert('權限不足！');

        const opt = prompt(
          `刪除【${shift.doctor} - ${shift.shift}】(${currentMonth}/${day}號)\n\n` +
          `[1] 僅刪除 ${currentMonth}/${day}號 這一天單診\n` +
          `[2] 批次刪除【包含今日與後續所有】同醫師的 ${shift.shift} 診次`, 
          "1"
        );

        if (opt === '1') {
          await supabase.from('roster_shifts').delete().eq('id', shift.id);
          setRosterShifts(rosterShifts.filter(s => s.id !== shift.id));
        } else if (opt === '2') {
          let query;
          if (shift.group_id) {
            query = supabase.from('roster_shifts').delete()
              .eq('group_id', shift.group_id)
              .gte('day', day);
          } else {
            query = supabase.from('roster_shifts').delete()
              .eq('dept', selectedDept)
              .eq('shift', shift.shift)
              .eq('doctor', shift.doctor)
              .eq('year', currentYear)
              .gte('month', currentMonth)
              .gte('day', day);
          }

          const { error } = await query;
          if (!error) {
            if (shift.group_id) {
              setRosterShifts(rosterShifts.filter(s => !(s.group_id === shift.group_id && s.day >= day)));
            } else {
              setRosterShifts(rosterShifts.filter(s => !(
                s.dept === selectedDept && s.shift === shift.shift && s.doctor === shift.doctor &&
                s.year === currentYear && ((s.month === currentMonth && s.day >= day) || s.month > currentMonth)
              )));
            }
            alert(`已批次刪除【${shift.doctor} - ${shift.shift}】後續所有門診！`);
          }
        }
      };

      const handleAddBulletin = async (e) => {
        e.preventDefault();
        if (!isApproved) return alert('權限不足！');
        const item = { ...newBulletin, date: new Date().toISOString().split('T')[0] };
        const { data, error } = await supabase.from('bulletins').insert([item]).select();
        if (!error && data) setBulletins([data[0], ...bulletins]);
        setShowBulletinModal(false);
      };

      const handleDeleteBulletin = async (id) => {
        if (!isApproved) return alert('權限不足！');
        if (confirm('確定刪除此公告？')) {
          await supabase.from('bulletins').delete().eq('id', id);
          setBulletins(bulletins.filter(b => b.id !== id));
        }
      };

      const handleAddPersonnel = async (e) => {
        e.preventDefault();
        if (!isApproved) return alert('權限不足！');
        const item = { category: newPerson.category, name: newPerson.name, note: newPerson.note };
        const { data, error } = await supabase.from('personnel').insert([item]).select();
        if (!error && data) setPersonnelList([...personnelList, data[0]]);
        setShowPersonnelModal(false);
      };

      const handleDeletePersonnel = async (id) => {
        if (!isApproved) return alert('權限不足！');
        if (confirm('確定刪除該人員？')) {
          await supabase.from('personnel').delete().eq('id', id);
          setPersonnelList(personnelList.filter(p => p.id !== id));
        }
      };

      const handlePrevMonth = () => { if (currentMonth === 1) { setCurrentMonth(12); setCurrentYear(currentYear - 1); } else { setCurrentMonth(currentMonth - 1); } };
      const handleNextMonth = () => { if (currentMonth === 12) { setCurrentMonth(1); setCurrentYear(currentYear + 1); } else { setCurrentMonth(currentMonth + 1); } };
      const handleFocusDateChange = (offset) => {
        const d = new Date(focusDate);
        d.setDate(d.getDate() + offset);
        setFocusDate(d.toISOString().split('T')[0]);
      };

      const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
      const firstDayOfWeek = new Date(currentYear, currentMonth - 1, 1).getDay();
      const [focusY, focusM, focusD] = focusDate.split('-').map(Number);

      return (
        <div class="max-w-7xl mx-auto space-y-6">
          {/* Header */}
          <header class="bg-white p-6 rounded-2xl shadow-sm border flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-4">
              <div class="p-4 bg-blue-50 text-blue-600 rounded-2xl font-bold text-[28px]">🏥</div>
              <div>
                <h1 class="text-[28px] md:text-[32px] font-bold text-gray-900 leading-tight">臺中慈濟醫院中醫部</h1>
                <p class="text-gray-500 text-[20px] mt-1">部務行政、綜合行事曆與學員跟診排班系統</p>
              </div>
            </div>
            
            <div class="no-print">
              {user ? (
                <div class="flex items-center gap-4 bg-gray-50 px-5 py-3 rounded-2xl border">
                  <div>
                    <div class="text-[20px] font-bold text-gray-800 flex items-center gap-2">
                      {user.user_metadata?.full_name || user.email.split('@')[0]}
                      {isApproved ? (
                        <span class="text-[14px] bg-emerald-100 text-emerald-800 px-2.5 py-0.5 rounded-full font-bold">已開通總醫師/管理者權限</span>
                      ) : (
                        <span class="text-[14px] bg-gray-200 text-gray-700 px-2.5 py-0.5 rounded-full font-bold">一般學員 (認領跟診)</span>
                      )}
                    </div>
                  </div>
                  <button onClick={() => supabase.auth.signOut()} class="px-4 py-2 bg-white border text-gray-600 rounded-xl text-[20px] hover:bg-gray-100 font-bold">登出</button>
                </div>
              ) : (
                <button onClick={() => supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } })} class="bg-blue-600 text-white px-6 py-3 rounded-2xl text-[20px] font-bold shadow hover:bg-blue-700">Google 帳號登入</button>
              )}
            </div>
          </header>

          {/* 6 大分頁導覽列 */}
          <nav class="flex flex-wrap gap-2 bg-white p-2 rounded-2xl border shadow-sm no-print">
            {[
              { id: 'today', name: '當日焦點', icon: '📍' },
              { id: 'calendar', name: '綜合行事曆', icon: '📅' },
              { id: 'roster', name: '跟診表', icon: '🩺' },
              { id: 'personnel', name: '中醫部醫師', icon: '👨‍⚕️' },
              { id: 'rules', name: '重要規範', icon: '📖' },
              { id: 'bulletin', name: '部上公佈欄', icon: '📢' }
            ].map(tab => (
              <button
                key={tab.id}
                onClick={() => setCurrentTab(tab.id)}
                class={`flex-1 min-w-[130px] py-3 px-4 rounded-xl font-bold text-[20px] transition flex items-center justify-center gap-2 ${
                  currentTab === tab.id ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'
                }`}
              >
                <span>{tab.icon}</span>
                <span>{tab.name}</span>
              </button>
            ))}
          </nav>

          {/* 1. 當日焦點 */}
          {currentTab === 'today' && (
            <div class="space-y-6">
              <div class="bg-gradient-to-r from-emerald-800 to-teal-900 p-8 rounded-2xl text-white shadow-md space-y-4">
                <div class="flex flex-wrap justify-between items-center gap-4">
                  <div>
                    <div class="text-[20px] opacity-80 font-bold uppercase tracking-wider">Today's Focus</div>
                    <h2 class="text-[32px] font-bold mt-1">重點動態（{focusY}年{focusM}月{focusD}日）</h2>
                  </div>

                  <div class="flex items-center gap-3 bg-white/10 p-2 rounded-2xl backdrop-blur-sm border border-white/20 text-[20px]">
                    <button onClick={() => handleFocusDateChange(-1)} class="px-3 py-1.5 bg-white/20 hover:bg-white/30 rounded-xl font-bold">◀ 前一天</button>
                    <input type="date" value={focusDate} onChange={e => setFocusDate(e.target.value)} class="bg-white text-gray-900 px-3 py-1.5 rounded-xl font-bold cursor-pointer outline-none" />
                    <button onClick={() => setFocusDate('2026-07-22')} class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-bold">今天</button>
                    <button onClick={() => handleFocusDateChange(1)} class="px-3 py-1.5 bg-white/20 hover:bg-white/30 rounded-xl font-bold">後一天 ▶</button>
                  </div>
                </div>
              </div>

              <div class="bg-white p-8 rounded-2xl border shadow-sm space-y-6">
                <h3 class="text-[26px] font-bold text-gray-900 border-b pb-4 flex items-center gap-3">
                  <span class="w-4 h-4 rounded-full bg-emerald-700"></span>
                  {focusY}年{focusM}月{focusD}日 行程與會議事件
                </h3>

                <div class="space-y-5">
                  {events.filter(e => e.year === focusY && e.month === focusM && e.day === focusD).map(ev => (
                    <div key={ev.id} onClick={() => setSelectedEvent(ev)} class="p-6 rounded-2xl border-l-8 bg-gray-50 space-y-3 cursor-pointer hover:bg-gray-100 transition" style={{ borderColor: ev.color }}>
                      <div class="flex justify-between items-center">
                        <div class="text-[26px] font-bold text-gray-900">{ev.title}</div>
                        <span class="text-[20px] px-4 py-1 rounded-full bg-white border font-bold text-gray-700">{ev.level}</span>
                      </div>
                      <div class="grid md:grid-cols-2 gap-3 text-[22px] text-gray-700">
                        <div>🕒 時間：<span class="font-bold text-emerald-800">{ev.time}</span></div>
                        <div>📍 地點：<span class="font-bold">{ev.location || '未定'}</span></div>
                        <div>👨‍⚕️ 主持/指導：<span class="font-bold">{ev.instructor || '黃仲諄醫師'}</span></div>
                        <div>📝 紀錄者：<span class="font-bold text-emerald-900">{ev.recorder || '無指定'}</span></div>
                        <div class="md:col-span-2">👥 參與人員：<span class="font-bold">{ev.participants || '全員'}</span></div>
                      </div>
                      {ev.note && <div class="text-[20px] text-gray-600 bg-white p-3 rounded-xl border mt-2">備註：{ev.note}</div>}
                    </div>
                  ))}

                  {events.filter(e => e.year === focusY && e.month === focusM && e.day === focusD).length === 0 && (
                    <div class="text-[22px] text-gray-400 py-10 text-center">該日期尚無排定行程事件</div>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* 2. 綜合行事曆 */}
          {currentTab === 'calendar' && (
            <div class="bg-white p-6 rounded-2xl border shadow-sm space-y-6">
              <div class="flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                  <button onClick={handlePrevMonth} class="px-4 py-2 border rounded-xl hover:bg-gray-50 text-[20px] font-bold">◀ 上個月</button>
                  <h2 class="text-[26px] font-bold text-gray-900">{currentYear} 年 {currentMonth} 月 行事曆</h2>
                  <button onClick={handleNextMonth} class="px-4 py-2 border rounded-xl hover:bg-gray-50 text-[20px] font-bold">下個月 ▶</button>
                </div>
                <div class="flex gap-3 no-print">
                  {isApproved && (
                    <button 
                      onClick={() => {
                        setNewEvent({ editId: null, title: '', day: 1, time: '08:00~09:00', location: '', instructor: '黃仲諄醫師', recorder: '', participants: '', note: '', level: '🔴 高度重要', isRecurring: false, weeklyDay: 1 });
                        setShowEventModal(true);
                      }} 
                      class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[20px] font-bold hover:bg-blue-700"
                    >
                      + 新增/批次排定事件
                    </button>
                  )}
                  <button onClick={() => window.print()} class="border px-5 py-2.5 rounded-xl text-[20px] font-bold hover:bg-gray-50">🖨️ 列印/下載</button>
                </div>
              </div>

              <div class="grid grid-cols-7 border-t border-l text-[20px]">
                {['週日', '週一', '週二', '週三', '週四', '週五', '週六'].map((d, i) => (
                  <div key={d} class={`p-3 text-center font-bold border-b border-r bg-gray-50 ${i === 0 || i === 6 ? 'text-red-500' : 'text-gray-800'}`}>{d}</div>
                ))}

                {Array.from({ length: firstDayOfWeek }).map((_, i) => (
                  <div key={'empty-' + i} class="p-2 min-h-[140px] border-b border-r bg-gray-50/20"></div>
                ))}

                {Array.from({ length: daysInMonth }).map((_, i) => {
                  const day = i + 1;
                  const dayEvents = events.filter(e => e.year === currentYear && e.month === currentMonth && e.day === day);

                  return (
                    <div key={day} class="p-2 min-h-[140px] border-b border-r space-y-2 hover:bg-blue-50/20 transition">
                      <div class="font-bold text-gray-800">{day}日</div>
                      {dayEvents.map(ev => (
                        <div key={ev.id} onClick={() => setSelectedEvent(ev)} class="p-3 rounded-2xl text-[18px] text-white space-y-1 shadow-sm cursor-pointer hover:opacity-90 transition" style={{ backgroundColor: ev.color }}>
                          <div class="text-[16px] font-medium opacity-95 flex items-center gap-1">🕒 {ev.time}</div>
                          <div class="font-bold text-[19px] leading-snug">{ev.title}</div>
                          {ev.recorder && <div class="text-[14px] opacity-90">📝 紀錄：{ev.recorder}</div>}
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* 3. 跟診表 */}
          {currentTab === 'roster' && (
            <div class="space-y-6">
              <div class="bg-white p-6 rounded-2xl border shadow-sm space-y-4">
                <div class="flex flex-wrap justify-between items-center gap-4">
                  <div class="flex items-center gap-4">
                    <button onClick={handlePrevMonth} class="px-4 py-2 border rounded-xl hover:bg-gray-50 text-[20px] font-bold">◀ 上個月</button>
                    <h2 class="text-[26px] font-bold text-gray-900">{currentYear} 年 {currentMonth} 月 跟診表</h2>
                    <button onClick={handleNextMonth} class="px-4 py-2 border rounded-xl hover:bg-gray-50 text-[20px] font-bold">下個月 ▶</button>
                  </div>

                  {isApproved && (
                    <button 
                      onClick={() => {
                        setNewRoster({ editId: null, day: 1, dept: selectedDept, shift: '早診', doctor: '莊佳穎醫師', studentName: '', isRecurring: false, weeklyDay: 1 });
                        setShowRosterModal(true);
                      }} 
                      class="bg-gray-900 text-white px-5 py-2.5 rounded-xl text-[20px] font-bold no-print hover:bg-gray-800"
                    >
                      ⚙️ 排診 / 新增醫師跟診診次
                    </button>
                  )}
                </div>

                <div class="flex flex-wrap gap-3 pt-2 border-t no-print">
                  {['內一', '內二', '婦兒科', '傷科', '針灸科'].map(dept => (
                    <button key={dept} onClick={() => setSelectedDept(dept)} class={`px-6 py-2.5 rounded-xl text-[22px] font-bold border transition ${selectedDept === dept ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-gray-700 hover:bg-gray-50'}`}>{dept}</button>
                  ))}
                </div>
              </div>

              <div class="grid grid-cols-7 border-t border-l text-[20px] bg-white rounded-2xl overflow-hidden border">
                {['週日', '週一', '週二', '週三', '週四', '週五', '週六'].map(d => (
                  <div key={d} class="p-3 text-center font-bold border-b border-r bg-gray-50 text-gray-800">{d}</div>
                ))}

                {Array.from({ length: firstDayOfWeek }).map((_, i) => (
                  <div key={'e-' + i} class="p-2 min-h-[150px] border-b border-r bg-gray-50/20"></div>
                ))}

                {Array.from({ length: daysInMonth }).map((_, i) => {
                  const day = i + 1;
                  const dayOfWeek = new Date(currentYear, currentMonth - 1, day).getDay();

                  const allDayShifts = rosterShifts.filter(s => s.year === currentYear && s.month === currentMonth && s.day === day && s.dept === selectedDept)
                    .sort((a, b) => {
                      const order = { '早診': 1, '午診': 2, '晚診': 3 };
                      return (order[a.shift] || 4) - (order[b.shift] || 4);
                    });

                  return (
                    <div 
                      key={day} 
                      onClick={() => {
                        if (isApproved) {
                          setNewRoster({ editId: null, day: day, dept: selectedDept, shift: '早診', doctor: '莊佳穎醫師', studentName: '', isRecurring: false, weeklyDay: dayOfWeek });
                          setShowRosterModal(true);
                        }
                      }} 
                      class={`p-2 min-h-[150px] border-b border-r space-y-2 transition ${isApproved ? 'hover:bg-blue-50/30 cursor-pointer' : ''}`}
                    >
                      <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-800">{day}日</span>
                        {isApproved && <span class="text-[16px] text-blue-500 font-bold opacity-0 hover:opacity-100 no-print">+點擊排診</span>}
                      </div>
                      
                      {allDayShifts.map(shift => (
                        <div 
                          key={shift.id} 
                          onClick={(e) => handleCardClick(e, shift, day)} 
                          class={`border p-2.5 rounded-xl text-[18px] transition space-y-1 shadow-sm relative group cursor-pointer ${getShiftStyle(shift.shift)}`}
                        >
                          <div class="flex justify-between items-center">
                            <div class="font-bold">{shift.doctor} ({shift.shift})</div>
                            {isApproved && (
                              <button onClick={(e) => handleDeleteRoster(e, shift, day)} class="text-red-500 hover:text-red-700 font-bold text-[16px] p-1 rounded hover:bg-red-50/50 no-print" title="刪除此診次">🗑️</button>
                            )}
                          </div>
                          <div class="opacity-90 font-medium">
                            👨‍🎓 學生：{shift.students && shift.students.length > 0 ? shift.students.join('、') : <span class="opacity-50">待認領</span>}
                          </div>
                          {isApproved && <div class="text-[12px] font-bold opacity-0 group-hover:opacity-100 text-right">✏️ 點擊獨立修改跟診學生</div>}
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* 4. 中醫部醫師 */}
          {currentTab === 'personnel' && (
            <div class="bg-white p-8 rounded-2xl border shadow-sm space-y-8">
              <div class="flex justify-between items-center border-b pb-4">
                <div>
                  <h2 class="text-[28px] font-bold text-gray-900">👨‍⚕️ 中醫部醫師陣容與幹部</h2>
                  <p class="text-[20px] text-gray-500 mt-1">涵蓋當月部總、科總、住院醫師、外訓與實習醫師</p>
                </div>
                {isApproved && (
                  <button onClick={() => setShowPersonnelModal(true)} class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[20px] font-bold hover:bg-blue-700 no-print">⚙️ 編輯/增減醫師名單</button>
                )}
              </div>

              <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 text-[22px]">
                {[
                  { cat: 'chiefDepartment', title: '🌟 當月部總醫師', bg: 'bg-blue-50/80', border: 'border-blue-200', text: 'text-blue-900' },
                  { cat: 'chiefSections', title: '🩺 當月科總醫師', bg: 'bg-indigo-50/80', border: 'border-indigo-200', text: 'text-indigo-900' },
                  { cat: 'residents', title: '🏥 各科住院醫師', bg: 'bg-emerald-50/80', border: 'border-emerald-200', text: 'text-emerald-900' },
                  { cat: 'specialtyTrainings', title: '🔄 專科輪訓醫師', bg: 'bg-amber-50/80', border: 'border-amber-200', text: 'text-amber-900' },
                  { cat: 'externalTrainings', title: '🚑 外訓醫師', bg: 'bg-purple-50/80', border: 'border-purple-200', text: 'text-purple-900' },
                  { cat: 'interns', title: '👨‍🎓 輪訓實習醫師', bg: 'bg-teal-50/80', border: 'border-teal-200', text: 'text-teal-900' }
                ].map(group => (
                  <div key={group.cat} class={`p-6 rounded-2xl ${group.bg} border ${group.border} space-y-3`}>
                    <h3 class={`font-bold text-[24px] ${group.text} border-b ${group.border} pb-2`}>{group.title}</h3>
                    <div class="space-y-2">
                      {personnelList.filter(p => p.category === group.cat).map(p => (
                        <div key={p.id} class="flex justify-between items-center bg-white p-3 rounded-xl border">
                          <span class="font-bold">{p.name} <span class="text-gray-500 text-[18px]">({p.note})</span></span>
                          {isApproved && <button onClick={() => handleDeletePersonnel(p.id)} class="text-red-500 font-bold text-[18px] no-print">🗑️</button>}
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 5. 重要規範 */}
          {currentTab === 'rules' && (
            <div class="bg-white p-8 rounded-2xl border shadow-sm space-y-8">
              <div class="border-b pb-4">
                <h2 class="text-[28px] font-bold text-gray-900">本院醫師重要規範</h2>
                <p class="text-[20px] text-gray-500 mt-1">包含本院醫師守則、住院醫師守則與實習醫師守則</p>
              </div>

              <div class="space-y-8">
                <div class="space-y-4">
                  <h3 class="text-[26px] font-bold text-blue-900 bg-blue-50 p-4 rounded-xl border border-blue-200">一、本院醫師守則</h3>
                </div>

                <div class="space-y-4">
                  <h3 class="text-[26px] font-bold text-indigo-900 bg-indigo-50 p-4 rounded-xl border border-indigo-200">二、住院醫師守則</h3>
                </div>

                <div class="space-y-4">
                  <h3 class="text-[26px] font-bold text-emerald-900 bg-emerald-50 p-4 rounded-xl border border-emerald-200">三、實習醫師守則</h3>

                  <div class="p-6 rounded-2xl border bg-gray-50 space-y-4 text-[20px] leading-relaxed text-gray-800">
                    <div class="font-bold text-[22px] text-gray-900 border-b pb-2">❖ 注意事項：</div>
                    
                    <ol class="list-decimal list-inside space-y-3 pl-2">
                      <li>住院醫師及實習醫師病例及期刊報告請於3日前寄出初稿給全體中醫部醫師。</li>
                      <li>中醫部行政會議、聯合視訊會議：實習醫師不參加。</li>
                      <li>大內科行政會議：內婦兒科住院醫師、內婦兒科主治醫師必須參加，輪訓內婦兒科住院醫師及實習醫師不強制參加。</li>
                      <li>針傷科行政會議：針傷科主治醫師、住院醫師、護理人員必須參加，輪訓針傷科住院醫師及實習醫師不強制參加。</li>
                      <li>新思維教育講座：請實習醫師、住院醫師(R1-R2)及內科資深住院醫師必須參加，請紀錄者紀錄並錄影後將影像檔存至中醫部隨身硬碟。</li>
                      <li>須彌山講座：經專家同意後錄影，請紀錄者紀錄並錄影後將影像檔存至中醫部硬碟。請負責須彌山紀錄的醫師準備講者的茶水，並檢查麥克風正常運作與否。</li>
                      <li>&lt;注意&gt;：輪訓藥局醫師仍需參與科內報告，離開藥局前請先報請中藥局主任。輪訓中藥局的實習醫師不必交病例報告，但是每周要交一篇A4兩面的心得報告。</li>
                    </ol>

                    <div class="pt-4 border-t space-y-1 font-medium bg-white p-4 rounded-xl border">
                      <div>&lt;全&gt;中醫部全體主治、實習、住院醫師皆須參加；</div>
                      <div>&lt;實住12&gt;實習醫師跟第一年、第二年住院醫師需參加。</div>
                      <div>&lt;內&gt;輪訓內科跟當科資深、主治醫師者需參加；</div>
                      <div>&lt;針&gt;輪訓針灸科跟當科資深、主治醫師者需參加；</div>
                      <div>&lt;傷&gt;輪訓傷科跟資深、當科主治醫師者需參加；</div>
                      <div>&lt;婦兒&gt;輪訓婦兒科跟資深、當科主治醫師者需參加；</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 6. 部上公佈欄 */}
          {currentTab === 'bulletin' && (
            <div class="bg-white p-6 rounded-2xl border shadow-sm space-y-6">
              <div class="flex justify-between items-center border-b pb-4">
                <h2 class="text-[26px] font-bold text-gray-900">📢 部上事務公佈欄</h2>
                {isApproved && <button onClick={() => setShowBulletinModal(true)} class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[20px] font-bold hover:bg-blue-700 no-print">+ 發布新公告</button>}
              </div>

              <div class="space-y-4">
                {bulletins.map(item => (
                  <div key={item.id} class={`p-6 rounded-2xl border space-y-3 relative ${item.level === '重要' ? 'bg-red-50/50 border-red-200' : 'bg-gray-50 border-gray-200'}`}>
                    <div class="flex items-center gap-3">
                      <span class={`px-3 py-1 rounded-full text-[18px] font-bold ${item.level === '重要' ? 'bg-red-600 text-white' : 'bg-gray-200 text-gray-700'}`}>{item.level === '重要' ? '🔴 重要' : '🔵 普通'}</span>
                      <h3 class="font-bold text-[24px] text-gray-900">{item.title}</h3>
                    </div>
                    <p class="text-[22px] text-gray-700 leading-relaxed whitespace-pre-line">{item.content}</p>
                    <div class="text-[20px] text-gray-500 pt-2 border-t border-gray-200 flex justify-between items-center">
                      <span>發布者：{item.author} ｜ 日期：{item.date}</span>
                      {isApproved && <button onClick={() => handleDeleteBulletin(item.id)} class="text-red-500 font-bold hover:underline no-print text-[18px]">🗑️ 刪除</button>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Modal：事件詳情 */}
          {selectedEvent && (
            <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 no-print" onClick={() => setSelectedEvent(null)}>
              <div class="bg-white rounded-3xl max-w-xl w-full p-8 space-y-6 shadow-2xl relative" onClick={e => e.stopPropagation()}>
                <div class="flex justify-between items-start border-b pb-4">
                  <div>
                    <span class="text-[18px] px-3 py-1 rounded-full bg-gray-100 font-bold text-gray-700">{selectedEvent.level}</span>
                    <h3 class="font-bold text-[28px] text-gray-900 mt-2">{selectedEvent.title}</h3>
                  </div>
                  <button onClick={() => setSelectedEvent(null)} class="text-gray-400 hover:text-gray-600 text-[28px] font-bold">✕</button>
                </div>
                <div class="space-y-4 text-[22px] text-gray-800">
                  <div>🕒 時間：<strong class="text-blue-700">{selectedEvent.time}</strong></div>
                  <div>📍 地點：<strong>{selectedEvent.location || '無指定'}</strong></div>
                  <div>👨‍⚕️ 主持：<strong>{selectedEvent.instructor || '黃仲諄醫師'}</strong></div>
                  <div class="bg-emerald-50 p-3 rounded-xl border border-emerald-200 text-emerald-900">
                    📝 紀錄：<strong>{selectedEvent.recorder || '無指定紀錄者'}</strong>
                  </div>
                  <div>👥 參與：<strong>{selectedEvent.participants || '全員'}</strong></div>
                  {selectedEvent.note && <div class="bg-gray-50 p-4 rounded-2xl border text-[20px] whitespace-pre-line">備註：{selectedEvent.note}</div>}
                </div>
                <div class="flex justify-between items-center pt-4 border-t">
                  {isApproved ? (
                    <div class="flex gap-2">
                      <button onClick={() => openEditEventModal(selectedEvent)} class="px-5 py-2.5 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-xl font-bold text-[18px]">✏️ 編輯此事件</button>
                      <button onClick={() => handleDeleteEvent(selectedEvent)} class="px-5 py-2.5 bg-red-50 text-red-600 hover:bg-red-100 rounded-xl font-bold text-[18px]">🗑️ 刪除</button>
                    </div>
                  ) : <div></div>}
                  <button onClick={() => setSelectedEvent(null)} class="px-6 py-2.5 bg-blue-600 text-white rounded-xl font-bold text-[20px]">關閉</button>
                </div>
              </div>
            </div>
          )}

          {/* Modal：新增/編輯/批次事件 */}
          {showEventModal && isApproved && (
            <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 no-print">
              <div class="bg-white rounded-3xl max-w-xl w-full p-8 space-y-5 shadow-2xl max-h-[90vh] overflow-y-auto">
                <h3 class="font-bold text-[26px] text-gray-900 border-b pb-3">
                  {newEvent.editId ? '✏️ 編輯行事曆事件' : '📅 新增 / 批次排定行事曆事件'}
                </h3>
                <form onSubmit={handleSaveEvent} class="space-y-4 text-[20px]">
                  {!newEvent.editId && (
                    <div class="bg-gray-100 p-2 rounded-xl flex gap-2">
                      <button type="button" onClick={() => setNewEvent({...newEvent, isRecurring: false})} class={`flex-1 py-2 rounded-lg font-bold text-[18px] ${!newEvent.isRecurring ? 'bg-white shadow text-blue-600' : 'text-gray-600'}`}>指定單日事件</button>
                      <button type="button" onClick={() => setNewEvent({...newEvent, isRecurring: true})} class={`flex-1 py-2 rounded-lg font-bold text-[18px] ${newEvent.isRecurring ? 'bg-white shadow text-blue-600' : 'text-gray-600'}`}>🔄 批次每週重複事件</button>
                    </div>
                  )}

                  <div>
                    <label class="block text-gray-700 font-bold mb-1">等級</label>
                    <select value={newEvent.level} onChange={e => setNewEvent({...newEvent, level: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold">
                      <option value="🔴 高度重要">🔴 高度重要</option>
                      <option value="🟡 中度重要">🟡 中度重要</option>
                      <option value="🟢 一般事件">🟢 一般事件</option>
                    </select>
                  </div>

                  {newEvent.isRecurring ? (
                    <div>
                      <label class="block text-blue-900 font-bold mb-1">當月每週幾固定舉行？</label>
                      <select value={newEvent.weeklyDay} onChange={e => setNewEvent({...newEvent, weeklyDay: e.target.value})} class="w-full border rounded-xl p-3 bg-blue-50 font-bold">
                        <option value="1">週一</option><option value="2">週二</option><option value="3">週三</option><option value="4">週四</option><option value="5">週五</option><option value="6">週六</option><option value="0">週日</option>
                      </select>
                    </div>
                  ) : (
                    <div>
                      <label class="block text-gray-700 font-bold mb-1">日期 (幾號)</label>
                      <input type="number" min="1" max={daysInMonth} value={newEvent.day} onChange={e => setNewEvent({...newEvent, day: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold" />
                    </div>
                  )}

                  <div><label class="block text-gray-700 font-bold mb-1">事件名稱</label><input type="text" value={newEvent.title} onChange={e => setNewEvent({...newEvent, title: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" required placeholder="如：須彌山講座-雷射針灸" /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">時間</label><input type="text" value={newEvent.time} onChange={e => setNewEvent({...newEvent, time: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" placeholder="如：07:30~08:30" /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">地點</label><input type="text" value={newEvent.location} onChange={e => setNewEvent({...newEvent, location: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" placeholder="如：佛堂" /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">主持 / 指導醫師</label><input type="text" value={newEvent.instructor} onChange={e => setNewEvent({...newEvent, instructor: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" placeholder="如：Dr. Weber" /></div>
                  
                  <div class="bg-emerald-50 p-3 rounded-xl border border-emerald-200">
                    <label class="block text-emerald-900 font-bold mb-1">📝 紀錄者 (紀錄醫師)</label>
                    <input type="text" value={newEvent.recorder} onChange={e => setNewEvent({...newEvent, recorder: e.target.value})} class="w-full border rounded-xl p-3 bg-white font-bold" placeholder="例如：蕭鈺廷醫師" />
                  </div>

                  <div><label class="block text-gray-700 font-bold mb-1">參與人員</label><input type="text" value={newEvent.participants} onChange={e => setNewEvent({...newEvent, participants: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" placeholder="如：全院" /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">備註說明</label><textarea value={newEvent.note} onChange={e => setNewEvent({...newEvent, note: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 h-24"></textarea></div>
                  <div class="flex justify-end gap-3 pt-3"><button type="button" onClick={() => setShowEventModal(false)} class="px-6 py-3 border rounded-xl font-bold text-gray-600">取消</button><button type="submit" class="px-6 py-3 bg-blue-600 text-white font-bold rounded-xl">儲存事件</button></div>
                </form>
              </div>
            </div>
          )}

          {/* Modal：設定跟診診次（精確獨立編輯 vs 批次新增） */}
          {showRosterModal && isApproved && (
            <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 no-print">
              <div class="bg-white rounded-3xl max-w-xl w-full p-8 space-y-5 shadow-2xl">
                <h3 class="font-bold text-[26px] text-gray-900 border-b pb-3">
                  {newRoster.editId ? `✏️ 編輯【${selectedDept}】單診跟診資料 (${currentMonth}/${newRoster.day}號)` : `⚙️ 新增【${selectedDept}】跟診診次`}
                </h3>
                <form onSubmit={handleSaveRoster} class="space-y-4 text-[20px]">
                  {!newRoster.editId && (
                    <div class="bg-gray-100 p-2 rounded-xl flex gap-2">
                      <button type="button" onClick={() => setNewRoster({...newRoster, isRecurring: false})} class={`flex-1 py-2 rounded-lg font-bold text-[18px] ${!newRoster.isRecurring ? 'bg-white shadow text-blue-600' : 'text-gray-600'}`}>指定單日門診</button>
                      <button type="button" onClick={() => setNewRoster({...newRoster, isRecurring: true})} class={`flex-1 py-2 rounded-lg font-bold text-[18px] ${newRoster.isRecurring ? 'bg-white shadow text-blue-600' : 'text-gray-600'}`}>🔄 批次每週固定門診</button>
                    </div>
                  )}

                  {newRoster.isRecurring && !newRoster.editId ? (
                    <div class="grid grid-cols-2 gap-3 bg-blue-50/60 p-4 rounded-xl border border-blue-200">
                      <div><label class="block text-blue-900 font-bold mb-1">當月每週幾上診？</label><select value={newRoster.weeklyDay} onChange={e => setNewRoster({...newRoster, weeklyDay: e.target.value})} class="w-full border rounded-xl p-3 bg-white font-bold"><option value="1">週一</option><option value="2">週二</option><option value="3">週三</option><option value="4">週四</option><option value="5">週五</option><option value="6">週六</option></select></div>
                      <div><label class="block text-blue-900 font-bold mb-1">診別</label><select value={newRoster.shift} onChange={e => setNewRoster({...newRoster, shift: e.target.value})} class="w-full border rounded-xl p-3 bg-white font-bold"><option value="早診">早診</option><option value="午診">午診</option><option value="晚診">晚診</option></select></div>
                    </div>
                  ) : (
                    <div class="grid grid-cols-2 gap-3">
                      <div>
                        <label class="block text-gray-700 font-bold mb-1">日期 (幾號)</label>
                        <input type="number" min="1" max={daysInMonth} value={newRoster.day} onChange={e => setNewRoster({...newRoster, day: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold" />
                      </div>
                      <div>
                        <label class="block text-gray-700 font-bold mb-1">診別</label>
                        <select value={newRoster.shift} onChange={e => setNewRoster({...newRoster, shift: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold">
                          <option value="早診">早診</option>
                          <option value="午診">午診</option>
                          <option value="晚診">晚診</option>
                        </select>
                      </div>
                    </div>
                  )}

                  <div>
                    <label class="block text-gray-700 font-bold mb-1">跟診主治醫師</label>
                    <input type="text" value={newRoster.doctor} onChange={e => setNewRoster({...newRoster, doctor: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold" placeholder="例如：莊佳穎醫師" required />
                  </div>

                  <div>
                    <label class="block text-gray-700 font-bold mb-1">跟診學生 / 學員名單</label>
                    <input type="text" value={newRoster.studentName} onChange={e => setNewRoster({...newRoster, studentName: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold" placeholder="例如：沈小花、張小明" />
                    {newRoster.editId && (
                      <p class="text-[15px] text-blue-600 font-bold mt-1">📌 注意：修改此欄只會更新【{currentMonth}/{newRoster.day}號】這單一天的學生，其他天的診次不會改變！</p>
                    )}
                  </div>

                  <div class="flex justify-end gap-3 pt-3">
                    <button type="button" onClick={() => setShowRosterModal(false)} class="px-6 py-3 border rounded-xl font-bold text-gray-600">取消</button>
                    <button type="submit" class="px-6 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700">
                      {newRoster.editId ? '確定獨立修改當日學生' : '儲存門診設定'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Modal：增減醫師 */}
          {showPersonnelModal && isApproved && (
            <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 no-print">
              <div class="bg-white rounded-3xl max-w-xl w-full p-8 space-y-5 shadow-2xl">
                <h3 class="font-bold text-[26px] text-gray-900 border-b pb-3">⚙️ 增減醫師與幹部名單</h3>
                <form onSubmit={handleAddPersonnel} class="space-y-4 text-[20px]">
                  <div><label class="block text-gray-700 font-bold mb-1">類別</label><select value={newPerson.category} onChange={e => setNewPerson({...newPerson, category: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold"><option value="chiefDepartment">當月部總醫師</option><option value="chiefSections">當月科總醫師</option><option value="residents">各科住院醫師</option><option value="specialtyTrainings">專科輪訓醫師</option><option value="externalTrainings">外訓醫師</option><option value="interns">輪訓實習醫師</option></select></div>
                  <div><label class="block text-gray-700 font-bold mb-1">姓名</label><input type="text" value={newPerson.name} onChange={e => setNewPerson({...newPerson, name: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" required /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">職稱/備註</label><input type="text" value={newPerson.note} onChange={e => setNewPerson({...newPerson, note: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" /></div>
                  <div class="flex justify-end gap-3 pt-3"><button type="button" onClick={() => setShowPersonnelModal(false)} class="px-6 py-3 border rounded-xl font-bold text-gray-600">取消</button><button type="submit" class="px-6 py-3 bg-blue-600 text-white font-bold rounded-xl">儲存</button></div>
                </form>
              </div>
            </div>
          )}

          {/* Modal：公告 */}
          {showBulletinModal && isApproved && (
            <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 no-print">
              <div class="bg-white rounded-3xl max-w-xl w-full p-8 space-y-5 shadow-2xl">
                <h3 class="font-bold text-[26px] text-gray-900 border-b pb-3">📢 發布部上公告</h3>
                <form onSubmit={handleAddBulletin} class="space-y-4 text-[20px]">
                  <div><label class="block text-gray-700 font-bold mb-1">分類</label><select value={newBulletin.level} onChange={e => setNewBulletin({...newBulletin, level: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 font-bold"><option value="重要">🔴 重要</option><option value="普通">🔵 普通</option></select></div>
                  <div><label class="block text-gray-700 font-bold mb-1">標題</label><input type="text" value={newBulletin.title} onChange={e => setNewBulletin({...newBulletin, title: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" required /></div>
                  <div><label class="block text-gray-700 font-bold mb-1">內容</label><textarea value={newBulletin.content} onChange={e => setNewBulletin({...newBulletin, content: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50 h-32" required></textarea></div>
                  <div><label class="block text-gray-700 font-bold mb-1">發布單位/發布者</label><input type="text" value={newBulletin.author} onChange={e => setNewBulletin({...newBulletin, author: e.target.value})} class="w-full border rounded-xl p-3 bg-gray-50" /></div>
                  <div class="flex justify-end gap-3 pt-3"><button type="button" onClick={() => setShowBulletinModal(false)} class="px-6 py-3 border rounded-xl font-bold text-gray-600">取消</button><button type="submit" class="px-6 py-3 bg-blue-600 text-white font-bold rounded-xl">立即發布</button></div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
